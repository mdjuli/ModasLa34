<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda de Ropa</title>
    <link rel="stylesheet" href="css/estilo-comun.css">
</head>
<body>
    <header>
        <h1>🐻 MI LOCAL DE ROPA</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="#novedades">Novedades</a>
            <a href="#ofertas">Ofertas</a>
            <a href="admin/login.html">👑 Administrador</a>
        </nav>
    </header>
    
    <main>
        <h2>Bienvenidos a nuestra tienda</h2>
        <p>Estamos construyendo nuestro catálogo en línea. ¡Pronto tendremos novedades!</p>
        
        <div class="grid-productos" id="catalogo">
            <!-- Aquí irán los productos cuando conectemos Supabase -->
            <div class="producto-placeholder">
                <h3>Producto de ejemplo</h3>
                <p>$25.000</p>
            </div>
            <div class="producto-placeholder">
                <h3>Producto de ejemplo</h3>
                <p>$32.000</p>
            </div>
        </div>
    </main>
    
    <footer>
        <p>© 2026 Mi Local de Ropa - Todos los derechos reservados</p>
    </footer>
    
    <script src="js/supabase-config.js"></script>
<script>
  async function cargarProductos() {
    const contenedor = document.getElementById('catalogo');
    
    // Mostrar carga
    contenedor.innerHTML = '<p style="text-align: center;">Cargando productos...</p>';
    
    try {
      // Consultar productos de Supabase
      const productos = await supabaseClient.query('productos', {
        select: 'nombre, precio_venta, imagen_url, talla, color',
        order: 'nombre.asc'
      });
      
      if (productos.length === 0) {
        contenedor.innerHTML = '<p style="text-align: center;">No hay productos disponibles</p>';
        return;
      }
      
      // Generar HTML de productos
      let html = '';
      productos.forEach(p => {
        html += `
          <div class="producto-card">
            <img src="${p.imagen_url || 'https://via.placeholder.com/200'}" alt="${p.nombre}" style="width:100%; max-width:200px;">
            <h3>${p.nombre}</h3>
            <p class="talla-color">${p.talla || ''} ${p.color || ''}</p>
            <p class="precio">$${p.precio_venta?.toLocaleString() || '0'}</p>
          </div>
        `;
      });
      
      contenedor.innerHTML = html;
    } catch (error) {
      console.error('Error al cargar productos:', error);
      contenedor.innerHTML = '<p style="color: red;">Error al cargar productos</p>';
    }
  }
  
  // Cargar al iniciar
  cargarProductos();
</script>
</body>
</html>
