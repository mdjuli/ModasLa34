<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>Catálogo - Modas La 34</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fdf9f5;
            color: #3d352e;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* ===== HEADER ===== */
        header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #f0e6dc;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #4a3728;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: #b87c4e; }
        .logo i { color: #d4a5a9; }

        nav { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
        nav a {
            color: #4a3728;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #b87c4e; }

        .btn-nav {
            background: #b87c4e;
            color: white !important;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-nav:hover {
            background: #9a663f;
            transform: translateY(-2px);
        }

        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: none;
            border: none;
            color: #4a3728;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .dropbtn:hover { color: #b87c4e; }
        .dropdown-content {
            display: none;
            position: absolute;
            background: white;
            min-width: 210px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border-radius: 16px;
            overflow: hidden;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            border: 1px solid #f0e6dc;
        }
        .dropdown-content a {
            padding: 0.8rem 1.2rem;
            display: block;
            font-size: 0.8rem;
            text-transform: none;
            letter-spacing: normal;
            border-bottom: 1px solid #f5ede6;
        }
        .dropdown-content a:hover { background: #fdf9f5; color: #b87c4e !important; padding-left: 1.8rem; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown:hover .dropdown-content { display: block; }

        /* ===== MAIN ===== */
        .main-content {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .hero-section {
            text-align: center;
            padding: 2rem 0;
            background: linear-gradient(135deg, #fdf9f5, #f5ede6);
            border-radius: 40px;
            margin-bottom: 3rem;
        }
        .hero-section h2 {
            font-size: 2.8rem;
            color: #4a3728;
            font-weight: 700;
        }
        .hero-section p {
            color: #8b7a6b;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            font-family: 'Quicksand', sans-serif;
        }

        .buscador-wrapper {
            max-width: 480px;
            margin: -1.5rem auto 2.5rem;
        }
        .buscador-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e8ddd2;
            border-radius: 60px;
            font-size: 0.9rem;
            background: white;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .buscador-input:focus {
            outline: none;
            border-color: #b87c4e;
            box-shadow: 0 0 0 4px rgba(184,124,78,0.08);
        }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .producto-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid #f0e6dc;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .producto-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(184,124,78,0.08);
            border-color: #d4a5a9;
        }

        .producto-imagen {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f5ede6;
        }
        .producto-sin-imagen {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #f5ede6, #e8ddd2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
        }

        .producto-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .producto-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4a3728;
        }
        .producto-tallas {
            font-size: 0.75rem;
            color: #8b7a6b;
            margin: 4px 0;
        }
        .producto-colores {
            display: flex;
            gap: 6px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .producto-precio {
            font-size: 1.3rem;
            font-weight: 700;
            color: #b87c4e;
            margin: 0.5rem 0;
        }
        .producto-stock-status {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 0.5rem;
        }

        .producto-btn {
            width: 100%;
            padding: 0.8rem;
            background: #fdf9f5;
            border: 1.5px solid #e8ddd2;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            color: #4a3728;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
        }
        .producto-btn:hover {
            background: #b87c4e;
            border-color: #b87c4e;
            color: white;
            box-shadow: 0 4px 15px rgba(184,124,78,0.2);
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-contenido {
            background: white;
            margin: 2% auto;
            padding: 0;
            width: 92%;
            max-width: 950px;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            animation: modalPop 0.3s ease;
        }
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-cerrar {
            position: absolute;
            right: 16px;
            top: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 10;
            border: none;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }
        .modal-imagen {
            background: #fdf9f5;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-imagen img {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 16px;
        }
        .modal-imagen-placeholder { font-size: 6rem; }

        .modal-info {
            padding: 2rem;
            overflow-y: auto;
            max-height: 80vh;
        }
        .modal-info h2 { font-size: 1.8rem; color: #4a3728; }
        .modal-codigo { font-family: monospace; font-size: 0.7rem; color: #8b7a6b; background: #f5ede6; padding: 0.2rem 0.8rem; border-radius: 30px; display: inline-block; }
        .modal-precio { font-size: 2rem; font-weight: 700; color: #b87c4e; margin: 1rem 0; }

        /* Tallas */
        .tallas-scroll {
            max-height: 200px;
            overflow-y: auto;
            margin: 1rem 0;
        }
        .tallas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        .talla-card {
            background: #fdf9f5;
            border: 2px solid #e8ddd2;
            border-radius: 14px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .talla-card:hover {
            border-color: #b87c4e;
            transform: translateY(-2px);
        }
        .talla-card.selected {
            border-color: #b87c4e;
            background: #b87c4e15;
        }
        .talla-numero { font-weight: 700; font-size: 1.1rem; }

        .modal-botones {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-btn {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-wa { background: #25D366; color: white; }
        .btn-wa:hover { background: #1da851; transform: translateY(-2px); }
        .btn-close-modal { background: #f5ede6; color: #4a3728; border: 1px solid #e8ddd2; }
        .btn-close-modal:hover { background: #e8ddd2; }

        /* ===== WHATSAPP ===== */
        .wa-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 20px rgba(37,211,102,0.3);
            z-index: 999;
            text-decoration: none;
            transition: all 0.3s;
        }
        .wa-float:hover { transform: scale(1.05); background: #1da851; }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 2.5rem;
            color: #8b7a6b;
            font-size: 0.8rem;
            border-top: 1px solid #f0e6dc;
            margin-top: 3rem;
            background: white;
        }
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0.5rem 0 1rem;
        }
        .footer-social a {
            color: #8b7a6b;
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        .footer-social a:hover { color: #b87c4e; }

        .admin-link { font-size: 0.7rem; color: #c4b8ac; text-decoration: none; }
        .admin-link:hover { color: #b87c4e; }

        @media (max-width: 768px) {
            .header-inner { flex-direction: column; text-align: center; }
            nav { justify-content: center; gap: 1rem; }
            .grid-productos { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .producto-imagen, .producto-sin-imagen { height: 200px; }
            .modal-grid { grid-template-columns: 1fr; }
            .hero-section h2 { font-size: 2rem; }
            .hero-section { padding: 1.5rem; }
        }

        @media (max-width: 480px) {
            .grid-productos { grid-template-columns: 1fr 1fr; gap: 0.8rem; }
            .producto-imagen, .producto-sin-imagen { height: 150px; }
            .producto-info { padding: 0.8rem; }
            .producto-titulo { font-size: 0.9rem; }
            .producto-precio { font-size: 1rem; }
            .main-content { padding: 0 0.8rem; margin: 1.5rem auto; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="#" class="logo">
                <i class="fas fa-flower"></i> Modas <span>La 34</span>
            </a>
            <nav>
                <a href="#" class="btn-nav"><i class="fas fa-home"></i> Inicio</a>
                <div class="dropdown">
                    <button class="dropbtn">Colección <i class="fas fa-chevron-down" style="font-size:0.6rem;"></i></button>
                    <div class="dropdown-content">
                        <a href="#" onclick="filtrarPorCategoria('todos')">✨ Todos los productos</a>
                        <a href="#" onclick="filtrarPorCategoria('vestidos')">👗 Vestidos</a>
                        <a href="#" onclick="filtrarPorCategoria('blusas')">👚 Blusas</a>
                        <a href="#" onclick="filtrarPorCategoria('pantalones')">👖 Pantalones</a>
                        <a href="#" onclick="filtrarPorCategoria('deportivo')">⚽ Deportivo</a>
                        <a href="#" onclick="filtrarPorCategoria('caballero')">👔 Caballero</a>
                        <a href="#" onclick="filtrarPorCategoria('accesorios')">🎀 Accesorios</a>
                    </div>
                </div>
                <a href="admin/login.html" style="font-size:0.65rem; color:#c4b8ac;">🔑 Admin</a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="hero-section">
            <h2>🛍️ Prendas con esencia</h2>
            <p>Diseños atemporales para almas libres</p>
        </div>

        <div class="buscador-wrapper">
            <input type="text" id="buscador-productos" placeholder="🔍 Buscar productos..." class="buscador-input">
        </div>

        <div class="grid-productos" id="catalogo-productos">
            <div class="producto-card">
                <div class="producto-sin-imagen">🌿</div>
                <div class="producto-info">
                    <h3 class="producto-titulo">Cargando...</h3>
                    <p class="producto-precio">$0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="modal-producto" class="modal" style="display: none;">
        <div class="modal-contenido">
            <button class="modal-cerrar" onclick="cerrarModal()">&times;</button>
            <div id="modal-contenido-producto"></div>
        </div>
    </div>

    <!-- WhatsApp -->
    <a href="https://wa.me/573001234567?text=Hola%20Modas%20La%2034" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        <div class="footer-social">
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-tiktok"></i></a>
        </div>
        <p>© 2026 Modas La 34 — Diseño atemporal para almas libres</p>
        <a href="admin/login.html" class="admin-link">🔑 Acceso administrador</a>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/catalogo.js"></script>
    <script>
        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                const content = dropdown.querySelector('.dropdown-content');
                if (content) content.style.display = 'none';
            }
        });
    </script>
</body>
</html>
