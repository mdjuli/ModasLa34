<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>Catálogo - Modas La 34</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #fdf9f5;
            color: #3d352e;
            min-height: 100vh;
        }

        h1, h2, h3 { font-family: 'Playfair Display', serif; }

        /* ===== SCROLL ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f5ede6; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #d4a5a9; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #b87c4e; }

        /* ===== HEADER ===== */
        header {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #f0e6dc;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #4a3728;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo span { color: #b87c4e; }
        .logo i { color: #d4a5a9; }

        nav { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
        nav a {
            color: #4a3728;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        nav a:hover { color: #b87c4e; }

        .btn-nav {
            background: #b87c4e;
            color: white !important;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }
        .btn-nav:hover {
            background: #9a663f;
            transform: translateY(-2px);
        }

        .dropdown { position: relative; display: inline-block; }
        .dropbtn {
            background: none;
            border: none;
            color: #4a3728;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }
        .dropbtn:hover { color: #b87c4e; }
        .dropdown-content {
            display: none;
            position: absolute;
            background: white;
            min-width: 210px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            border-radius: 16px;
            overflow: hidden;
            top: 100%;
            left: 0;
            margin-top: 0.5rem;
            border: 1px solid #f0e6dc;
        }
        .dropdown-content a {
            padding: 0.8rem 1.2rem;
            display: block;
            font-size: 0.8rem;
            text-transform: none;
            letter-spacing: normal;
            border-bottom: 1px solid #f5ede6;
        }
        .dropdown-content a:hover { background: #fdf9f5; color: #b87c4e !important; padding-left: 1.8rem; }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown:hover .dropdown-content { display: block; }

        /* ===== MAIN ===== */
        .main-content {
            max-width: 1400px;
            margin: 3rem auto;
            padding: 0 2rem;
        }

        .hero-section {
            text-align: center;
            padding: 2rem 0;
            background: linear-gradient(135deg, #fdf9f5, #f5ede6);
            border-radius: 40px;
            margin-bottom: 3rem;
        }
        .hero-section h2 {
            font-size: 2.8rem;
            color: #4a3728;
            font-weight: 700;
        }
        .hero-section p {
            color: #8b7a6b;
            font-size: 1.1rem;
            margin-top: 0.5rem;
            font-family: 'Quicksand', sans-serif;
        }

        .buscador-wrapper {
            max-width: 480px;
            margin: -1.5rem auto 2.5rem;
            position: relative;
        }
        .buscador-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e8ddd2;
            border-radius: 60px;
            font-size: 0.9rem;
            background: white;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .buscador-input:focus {
            outline: none;
            border-color: #b87c4e;
            box-shadow: 0 0 0 4px rgba(184,124,78,0.08);
        }

        /* ===== GRID ===== */
        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .producto-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s ease;
            border: 1px solid #f0e6dc;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .producto-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(184,124,78,0.08);
            border-color: #d4a5a9;
        }

        .producto-imagen {
            width: 100%;
            height: 300px;
            object-fit: cover;
            background: #f5ede6;
        }
        .producto-sin-imagen {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #f5ede6, #e8ddd2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
        }

        .producto-info {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .producto-titulo {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #4a3728;
        }
        .producto-tallas {
            font-size: 0.75rem;
            color: #8b7a6b;
            margin: 4px 0;
        }
        .producto-colores {
            display: flex;
            gap: 6px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .producto-precio {
            font-size: 1.3rem;
            font-weight: 700;
            color: #b87c4e;
            margin: 0.5rem 0;
        }
        .producto-stock-status {
            font-size: 0.7rem;
            font-weight: 500;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            display: inline-block;
            width: fit-content;
            margin-bottom: 0.5rem;
        }
        .stock-available { background: #e8f5e9; color: #2e7d32; }
        .stock-low { background: #fff3e0; color: #e67e22; }
        .stock-out { background: #ffebee; color: #c62828; }

        .producto-btn {
            width: 100%;
            padding: 0.8rem;
            background: #fdf9f5;
            border: 1.5px solid #e8ddd2;
            border-radius: 60px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            color: #4a3728;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
        }
        .producto-btn:hover {
            background: #b87c4e;
            border-color: #b87c4e;
            color: white;
            box-shadow: 0 4px 15px rgba(184,124,78,0.2);
        }

        /* ===== MODAL MEJORADO ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex !important; }

        .modal-contenido {
            background: white;
            width: 92%;
            max-width: 950px;
            max-height: 90vh;
            border-radius: 32px;
            position: relative;
            overflow: hidden;
            animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }

        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-cerrar {
            position: absolute;
            right: 16px;
            top: 16px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 20;
            border: none;
            transition: all 0.3s;
        }
        .modal-cerrar:hover { background: rgba(0,0,0,0.6); transform: rotate(90deg); }

        .modal-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 400px;
        }

        .modal-imagen {
            background: #fdf9f5;
            padding: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 350px;
        }
        .modal-imagen img {
            width: 100%;
            max-height: 450px;
            object-fit: contain;
            border-radius: 16px;
        }
        .modal-imagen-placeholder { font-size: 6rem; }

        .modal-info {
            padding: 2rem;
            overflow-y: auto;
            max-height: 80vh;
        }

        .modal-info h2 {
            font-size: 1.8rem;
            color: #4a3728;
            margin-bottom: 0.3rem;
            padding-right: 2.5rem;
        }

        .modal-codigo {
            font-family: monospace;
            font-size: 0.7rem;
            color: #8b7a6b;
            background: #f5ede6;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .modal-precio {
            font-size: 2rem;
            font-weight: 700;
            color: #b87c4e;
            margin: 1rem 0;
        }

        .modal-stock-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }

        .modal-detalle p {
            margin: 0.4rem 0;
            color: #5c4b3a;
            font-size: 0.9rem;
        }

        /* Tallas */
        .tallas-scroll {
            max-height: 220px;
            overflow-y: auto;
            margin: 1rem 0;
            padding-right: 5px;
        }
        .tallas-scroll::-webkit-scrollbar { width: 4px; }
        .tallas-scroll::-webkit-scrollbar-track { background: #f5ede6; border-radius: 10px; }
        .tallas-scroll::-webkit-scrollbar-thumb { background: #d4a5a9; border-radius: 10px; }

        .tallas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }

        .talla-card {
            background: #fdf9f5;
            border: 2px solid #e8ddd2;
            border-radius: 14px;
            padding: 10px 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .talla-card:hover {
            border-color: #b87c4e;
            transform: translateY(-2px);
        }
        .talla-card.selected {
            border-color: #b87c4e;
            background: #b87c4e15;
        }
        .talla-numero { font-weight: 700; font-size: 1.1rem; color: #4a3728; }
        .talla-precio { font-size: 0.7rem; color: #b87c4e; }
        .talla-stock { font-size: 0.6rem; color: #aaa; }

        /* Colores en modal */
        .colores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin: 1rem 0;
            max-height: 150px;
            overflow-y: auto;
        }
        .color-card {
            background: #fdf9f5;
            border: 2px solid #e8ddd2;
            border-radius: 12px;
            padding: 8px 4px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .color-card:hover {
            border-color: #b87c4e;
            transform: translateY(-2px);
        }
        .color-card.selected {
            border-color: #b87c4e;
            background: #b87c4e15;
        }
        .color-circulo {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            margin: 0 auto 5px;
            border: 2px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-nombre { font-size: 0.65rem; font-weight: 500; color: #4a3728; }
        .color-stock { font-size: 0.55rem; color: #aaa; }

        .seleccion-info {
            background: #e8f5e9;
            padding: 10px 14px;
            border-radius: 14px;
            margin: 1rem 0;
            text-align: center;
            font-size: 0.85rem;
            color: #2c5e2c;
        }

        .modal-botones {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-btn {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-wa {
            background: #25D366;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-wa:hover { background: #1da851; transform: translateY(-2px); }
        .btn-close-modal {
            background: #f5ede6;
            color: #4a3728;
            border: 1px solid #e8ddd2;
        }
        .btn-close-modal:hover { background: #e8ddd2; }

        /* ===== WHATSAPP FLOTANTE ===== */
        .wa-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #25D366;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 4px 20px rgba(37,211,102,0.25);
            z-index: 999;
            text-decoration: none;
            transition: all 0.3s;
        }
        .wa-float:hover { transform: scale(1.05); background: #1da851; }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            padding: 2.5rem;
            color: #8b7a6b;
            font-size: 0.8rem;
            border-top: 1px solid #f0e6dc;
            margin-top: 3rem;
            background: white;
        }
        .footer-social {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin: 0.5rem 0 1rem;
        }
        .footer-social a {
            color: #8b7a6b;
            font-size: 1.2rem;
            transition: color 0.3s;
        }
        .footer-social a:hover { color: #b87c4e; }

        .admin-link { font-size: 0.7rem; color: #c4b8ac; text-decoration: none; }
        .admin-link:hover { color: #b87c4e; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header-inner { flex-direction: column; text-align: center; }
            nav { justify-content: center; gap: 1rem; }
            .grid-productos { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .producto-imagen, .producto-sin-imagen { height: 200px; }
            .modal-grid { grid-template-columns: 1fr; }
            .modal-imagen { min-height: 200px; padding: 1rem; }
            .modal-info { max-height: 55vh; }
            .hero-section h2 { font-size: 2rem; }
            .hero-section { padding: 1.5rem; }
        }

        @media (max-width: 480px) {
            .grid-productos { grid-template-columns: 1fr 1fr; gap: 0.8rem; }
            .producto-imagen, .producto-sin-imagen { height: 150px; }
            .producto-info { padding: 0.8rem; }
            .producto-titulo { font-size: 0.9rem; }
            .producto-precio { font-size: 1rem; }
            .main-content { padding: 0 0.8rem; margin: 1.5rem auto; }
            .modal-contenido { width: 96%; border-radius: 20px; }
            .modal-info h2 { font-size: 1.3rem; }
            .modal-precio { font-size: 1.5rem; }
            .modal-botones { flex-direction: column; }
            .hero-section h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <a href="#" class="logo">
                <i class="fas fa-flower"></i> Modas <span>La 34</span>
            </a>
            <nav>
                <a href="#" class="btn-nav"><i class="fas fa-home"></i> Inicio</a>
                <div class="dropdown">
                    <button class="dropbtn">Colección <i class="fas fa-chevron-down" style="font-size:0.6rem;"></i></button>
                    <div class="dropdown-content">
                        <a href="#" onclick="filtrarPorCategoria('todos')">✨ Todos los productos</a>
                        <a href="#" onclick="filtrarPorCategoria('vestidos')">👗 Vestidos</a>
                        <a href="#" onclick="filtrarPorCategoria('blusas')">👚 Blusas</a>
                        <a href="#" onclick="filtrarPorCategoria('pantalones')">👖 Pantalones</a>
                        <a href="#" onclick="filtrarPorCategoria('deportivo')">⚽ Deportivo</a>
                        <a href="#" onclick="filtrarPorCategoria('caballero')">👔 Caballero</a>
                        <a href="#" onclick="filtrarPorCategoria('accesorios')">🎀 Accesorios</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="hero-section">
            <h2>🛍️ Prendas con esencia</h2>
            <p>Diseños atemporales para almas libres</p>
        </div>

        <div class="buscador-wrapper">
            <input type="text" id="buscador-productos" placeholder="🔍 Buscar productos..." class="buscador-input">
        </div>

        <div class="grid-productos" id="catalogo-productos">
            <div class="producto-card">
                <div class="producto-sin-imagen">🌿</div>
                <div class="producto-info">
                    <h3 class="producto-titulo">Cargando...</h3>
                    <p class="producto-precio">$0</p>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL MEJORADO -->
    <div id="modal-producto" class="modal">
        <div class="modal-contenido">
            <button class="modal-cerrar" onclick="cerrarModal()" aria-label="Cerrar modal">&times;</button>
            <div id="modal-contenido-producto"></div>
        </div>
    </div>

    <!-- WHATSAPP FLOTANTE -->
    <a href="https://wa.me/573001234567?text=Hola%20Modas%20La%2034" class="wa-float" target="_blank" aria-label="WhatsApp">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        <div class="footer-social">
            <a href="#" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" aria-label="Facebook"><i class="fab fa-facebook-f"></i></a>
            <a href="#" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
        </div>
        <p>© 2026 Modas La 34 — Diseño atemporal para almas libres</p>
        <a href="admin/login.html" class="admin-link">🔑 Acceso administrador</a>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script>
        // ============================================
        // 🌸 CATÁLOGO - MODAS LA 34 (Opción 2 Mejorada)
        // ============================================

        let todosLosProductos = [];
        let categoriaActual = 'todos';
        let productoActual = null;

        // ============================================
        // ORDENAR TALLAS
        // ============================================

        function ordenarVariantesPorTalla(variantes) {
            const ordenTallas = {
                'XS': 1, 'S': 2, 'M': 3, 'L': 4, 'XL': 5, 'XXL': 6, 'XXXL': 7,
                '2XL': 6, '3XL': 7, '4XL': 8, '5XL': 9,
                '6': 10, '7': 11, '8': 12, '9': 13, '10': 14, '11': 15, '12': 16,
                '34': 17, '35': 18, '36': 19, '37': 20, '38': 21, '39': 22, '40': 23,
                '41': 24, '42': 25, '43': 26, '44': 27, '45': 28, '46': 29
            };
            
            return [...variantes].sort((a, b) => {
                const ordenA = ordenTallas[a.talla] || 999;
                const ordenB = ordenTallas[b.talla] || 999;
                return ordenA - ordenB;
            });
        }

        // ============================================
        // CARGAR PRODUCTOS
        // ============================================

        async function cargarProductos() {
            try {
                const catalogo = document.getElementById('catalogo-productos');
                catalogo.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem;">Cargando productos...</div>';

                const response = await fetch(`${SUPABASE_URL}/rest/v1/vista_productos_completa?visible=eq.true&order=nombre`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });

                if (!response.ok) throw new Error('Error al cargar productos');

                todosLosProductos = await response.json();
                console.log('✅ Productos cargados:', todosLosProductos.length);
                mostrarProductos('todos');

            } catch (error) {
                console.error('❌ Error:', error);
                document.getElementById('catalogo-productos').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #b87c4e;">
                        ❌ Error al cargar los productos. Intenta de nuevo más tarde.
                    </div>
                `;
            }
        }

        // ============================================
        // FUNCIONES AUXILIARES
        // ============================================

        function getEmojiCategoria(cat) {
            const emojis = { 'vestidos': '👗', 'blusas': '👚', 'pantalones': '👖', 'deportivo': '⚽', 'caballero': '👔', 'accesorios': '🎀' };
            return emojis[cat] || '📦';
        }

        function obtenerTallasUnicas(producto) {
            const variantes = producto.variantes || [];
            return variantes.map(v => v.talla).filter((v, i, a) => a.indexOf(v) === i);
        }

        function obtenerColoresUnicos(producto) {
            const variantes = producto.variantes || [];
            const coloresVistos = new Set();
            const coloresUnicos = [];
            
            variantes.forEach(v => {
                const colores = v.colores || [];
                colores.forEach(c => {
                    if (c.codigo && !coloresVistos.has(c.codigo)) {
                        coloresVistos.add(c.codigo);
                        coloresUnicos.push({
                            nombre: c.nombre || 'Color',
                            codigo: c.codigo
                        });
                    }
                });
            });
            
            return coloresUnicos;
        }

        function obtenerRangoPrecios(producto) {
            const variantes = producto.variantes || [];
            const precios = variantes.map(v => v.precio_venta || 0);
            const min = Math.min(...precios);
            const max = Math.max(...precios);
            
            if (min === max || min === 0) {
                return `$${max.toLocaleString()}`;
            }
            return `$${min.toLocaleString()} - $${max.toLocaleString()}`;
        }

        function obtenerStockTotal(producto) {
            const variantes = producto.variantes || [];
            let total = 0;
            variantes.forEach(v => {
                const colores = v.colores || [];
                colores.forEach(c => {
                    total += c.stock || 0;
                });
            });
            return total;
        }

        // ============================================
        // MOSTRAR PRODUCTOS
        // ============================================

        function mostrarProductos(categoria) {
            const catalogo = document.getElementById('catalogo-productos');
            if (!catalogo) return;
            
            let productosFiltrados = todosLosProductos;
            
            if (categoria !== 'todos') {
                productosFiltrados = todosLosProductos.filter(p => 
                    p.categoria && p.categoria.toLowerCase() === categoria.toLowerCase()
                );
            }
            
            if (productosFiltrados.length === 0) {
                catalogo.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #a5a5a5;">
                        🛍️ No hay productos en esta categoría
                    </div>
                `;
                return;
            }
            
            catalogo.innerHTML = productosFiltrados.map(p => {
                const tallasUnicas = obtenerTallasUnicas(p);
                const coloresUnicos = obtenerColoresUnicos(p);
                const stockTotal = obtenerStockTotal(p);
                const rangoPrecios = obtenerRangoPrecios(p);
                
                let stockStatus = 'stock-available';
                let stockText = '✅ En stock';
                if (stockTotal === 0) { stockStatus = 'stock-out'; stockText = '❌ Agotado'; }
                else if (stockTotal < 5) { stockStatus = 'stock-low'; stockText = '⚠️ Stock bajo'; }
                
                return `
                    <div class="producto-card" onclick="verProducto(${p.id})">
                        ${p.imagen_url ? 
                            `<img src="${p.imagen_url}" alt="${p.nombre}" class="producto-imagen" loading="lazy">` : 
                            `<div class="producto-sin-imagen">
                                <span>${getEmojiCategoria(p.categoria)}</span>
                            </div>`
                        }
                        <div class="producto-info">
                            <h3 class="producto-titulo">${p.nombre}</h3>
                            ${tallasUnicas.length > 0 ? `<div class="producto-tallas"><strong>Tallas:</strong> ${tallasUnicas.join(' - ')}</div>` : ''}
                            ${coloresUnicos.length > 0 ? `
                                <div class="producto-colores">
                                    ${coloresUnicos.map(c => `
                                        <span class="color-dot" style="background: ${c.codigo};" title="${c.nombre}"></span>
                                    `).join('')}
                                </div>
                            ` : ''}
                            <div class="producto-precio">${rangoPrecios}</div>
                            <span class="producto-stock-status ${stockStatus}">${stockText}</span>
                            <button class="producto-btn" onclick="verProducto(${p.id}); event.stopPropagation();">
                                🔍 Ver detalles
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // FILTRAR POR CATEGORÍA
        // ============================================

        function filtrarPorCategoria(categoria) {
            categoriaActual = categoria;
            mostrarProductos(categoria);
            
            const dropbtn = document.querySelector('.dropbtn');
            if (dropbtn) {
                const nombresCategoria = {
                    'todos': '🔥 Todos los productos',
                    'vestidos': '👗 Vestidos',
                    'blusas': '👚 Blusas',
                    'pantalones': '👖 Pantalones',
                    'deportivo': '⚽ Deportivo',
                    'caballero': '👔 Caballero',
                    'accesorios': '🎀 Accesorios'
                };
                dropbtn.innerHTML = `${nombresCategoria[categoria] || 'Inicio'} <i class="fas fa-chevron-down" style="font-size:0.6rem;"></i>`;
            }
        }

        // ============================================
        // VER PRODUCTO EN MODAL
        // ============================================

        async function verProducto(id) {
            try {
                productoActual = todosLosProductos.find(p => p.id === id);
                if (!productoActual) {
                    alert('Producto no encontrado');
                    return;
                }
                
                llenarModal(productoActual);
                
                const modal = document.getElementById('modal-producto');
                modal.style.display = 'flex';
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                
            } catch (error) {
                console.error('Error al cargar producto:', error);
                alert('Error al cargar el producto');
            }
        }

        // ============================================
        // LLENAR MODAL (MEJORADO)
        // ============================================

        function llenarModal(producto) {
            const contenedor = document.getElementById('modal-contenido-producto');
            if (!contenedor) return;
            
            const variantes = ordenarVariantesPorTalla(producto.variantes || []);
            const emojis = {
                'vestidos': '👗', 'blusas': '👚', 'pantalones': '👖', 
                'deportivo': '⚽', 'caballero': '👔', 'accesorios': '🎀'
            };
            const emoji = emojis[producto.categoria] || '📦';
            
            // Calcular stock total
            let stockTotal = 0;
            variantes.forEach(v => {
                const colores = v.colores || [];
                colores.forEach(c => {
                    stockTotal += c.stock || 0;
                });
            });
            
            // Rango de precios
            const precios = variantes.map(v => v.precio_venta || 0);
            const precioMin = Math.min(...precios);
            const precioMax = Math.max(...precios);
            const rangoPrecios = precioMin === precioMax ? 
                `$${precioMin.toLocaleString()}` : 
                `$${precioMin.toLocaleString()} - $${precioMax.toLocaleString()}`;
            
            // Badge de stock
            let stockBadgeClass = 'stock-available';
            let stockBadgeText = '✅ En stock';
            if (stockTotal === 0) {
                stockBadgeClass = 'stock-out';
                stockBadgeText = '❌ Agotado';
            } else if (stockTotal < 5) {
                stockBadgeClass = 'stock-low';
                stockBadgeText = `⚠️ Stock bajo (${stockTotal})`;
            } else {
                stockBadgeText = `✅ En stock (${stockTotal})`;
            }
            
            // Generar HTML de tallas
            let tallasHTML = '';
            let coloresHTML = '';
            let seleccionInfoHTML = '';
            
            if (variantes.length > 0) {
                tallasHTML = `
                    <div style="margin: 1rem 0;">
                        <h4 style="color: #4a3728; margin-bottom: 0.8rem;">📏 Tallas disponibles</h4>
                        <div class="tallas-scroll">
                            <div class="tallas-grid">
                                ${variantes.map(v => {
                                    const colores = v.colores || [];
                                    const tieneStock = colores.some(c => (c.stock || 0) > 0) || (v.stock_total > 0);
                                    let stockClass = 'talla-sin-stock';
                                    let stockTexto = 'Sin stock';
                                    if (tieneStock) {
                                        const maxStock = Math.max(...colores.map(c => c.stock || 0), v.stock_total || 0);
                                        if (maxStock > 5) { stockClass = 'talla-con-stock'; stockTexto = `${maxStock} uds`; }
                                        else if (maxStock > 0) { stockClass = 'talla-stock-bajo'; stockTexto = `¡Quedan ${maxStock}!`; }
                                    }
                                    return `
                                        <div class="talla-card ${stockClass}" onclick="seleccionarTallaModal(${v.id}, '${v.talla}', ${v.precio_venta})">
                                            <div class="talla-numero">${v.talla}</div>
                                            <div class="talla-precio">$${(v.precio_venta || 0).toLocaleString()}</div>
                                            <div class="talla-stock">${stockTexto}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    </div>
                `;
                
                coloresHTML = `
                    <div id="colores-section" style="display: none;">
                        <h4 style="color: #4a3728; margin-bottom: 0.5rem;">🎨 Colores disponibles</h4>
                        <div id="colores-grid" class="colores-grid"></div>
                    </div>
                `;
                
                seleccionInfoHTML = `
                    <div id="seleccion-info" class="seleccion-info" style="display: none;">
                        <i class="fas fa-check-circle" style="color: #27ae60;"></i>
                        <span id="selected-talla-text"></span>
                        <span id="selected-color-text"></span>
                    </div>
                `;
            } else {
                tallasHTML = '<p style="color: #a5a5a5; text-align: center;">No hay tallas disponibles</p>';
            }
            
            // Generar HTML completo del modal
            contenedor.innerHTML = `
                <div class="modal-grid">
                    <div class="modal-imagen">
                        ${producto.imagen_url ? 
                            `<img src="${producto.imagen_url}" alt="${producto.nombre}">` : 
                            `<div class="modal-imagen-placeholder">${emoji}</div>`
                        }
                    </div>
                    <div class="modal-info">
                        <h2>${producto.nombre}</h2>
                        <div class="modal-codigo">${producto.codigo || 'N/A'}</div>
                        <div style="display: flex; align-items: center; gap: 0.5rem; margin: 0.5rem 0;">
                            <span style="font-size:0.9rem; color:#5c4b3a;">${emoji} ${producto.categoria || 'General'}</span>
                            <span style="background: #f5ede6; padding: 0.1rem 0.8rem; border-radius: 30px; font-size:0.7rem;">${producto.categoria || 'General'}</span>
                        </div>
                        <div class="modal-precio">${rangoPrecios}</div>
                        <span class="modal-stock-badge ${stockBadgeClass}">${stockBadgeText}</span>
                        
                        ${tallasHTML}
                        ${coloresHTML}
                        ${seleccionInfoHTML}
                        
                        <div class="modal-botones">
                            <button class="modal-btn btn-wa" onclick="consultarProductoWhatsApp()">
                                <i class="fab fa-whatsapp"></i> Consultar por WhatsApp
                            </button>
                            <button class="modal-btn btn-close-modal" onclick="cerrarModal()">
                                ❌ Cerrar
                            </button>
                        </div>
                    </div>
                </div>
            `;
            
            // Guardar datos para selección
            window.modalProductoActual = producto;
            window.modalVariantesActuales = variantes;
            window.modalSeleccion = {
                varianteId: null,
                talla: null,
                precio: null,
                colorIndex: null,
                colorNombre: null,
                stock: 0
            };
        }

        // ============================================
        // SELECCIONAR TALLA EN MODAL
        // ============================================

        function seleccionarTallaModal(varianteId, talla, precio) {
            // Remover selección anterior
            document.querySelectorAll('.talla-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Marcar seleccionada
            event.currentTarget.classList.add('selected');
            
            // Guardar selección
            window.modalSeleccion = {
                varianteId: varianteId,
                talla: talla,
                precio: precio,
                colorIndex: null,
                colorNombre: null,
                stock: 0
            };
            
            // Buscar la variante
            const variante = window.modalVariantesActuales.find(v => v.id === varianteId);
            
            // Actualizar texto
            const tallaText = document.getElementById('selected-talla-text');
            if (tallaText) tallaText.innerHTML = `Talla ${talla}`;
            
            if (variante && variante.colores && variante.colores.length > 0) {
                // Mostrar colores
                const coloresSection = document.getElementById('colores-section');
                const coloresGrid = document.getElementById('colores-grid');
                const seleccionInfo = document.getElementById('seleccion-info');
                
                const coloresOrdenados = [...variante.colores].sort((a, b) => {
                    if (a.nombre === null && b.nombre !== null) return 1;
                    if (a.nombre !== null && b.nombre === null) return -1;
                    if (a.nombre && b.nombre) return a.nombre.localeCompare(b.nombre);
                    return 0;
                });
                
                coloresGrid.innerHTML = coloresOrdenados.map((color, idx) => {
                    const tieneStock = (color.stock || 0) > 0;
                    return `
                        <div class="color-card ${tieneStock ? '' : 'color-sin-stock'}" 
                             onclick="seleccionarColorModal(${idx}, '${color.nombre || 'Sin color'}', ${color.stock || 0})">
                            <div class="color-circulo" style="background: ${color.codigo || '#ccc'};"></div>
                            <div class="color-nombre">${color.nombre || 'Sin color'}</div>
                            <div class="color-stock">${color.stock > 0 ? color.stock + ' uds' : 'Agotado'}</div>
                        </div>
                    `;
                }).join('');
                
                if (coloresSection) coloresSection.style.display = 'block';
                if (seleccionInfo) seleccionInfo.style.display = 'block';
                
                const colorText = document.getElementById('selected-color-text');
                if (colorText) colorText.innerHTML = 'Selecciona un color';
                
            } else {
                // Sin colores
                window.modalSeleccion.stock = variante?.stock_total || 0;
                const colorText = document.getElementById('selected-color-text');
                if (colorText) colorText.innerHTML = 'Sin color específico';
                
                const seleccionInfo = document.getElementById('seleccion-info');
                if (seleccionInfo) seleccionInfo.style.display = 'block';
                
                const coloresSection = document.getElementById('colores-section');
                if (coloresSection) coloresSection.style.display = 'none';
            }
        }

        // ============================================
        // SELECCIONAR COLOR EN MODAL
        // ============================================

        function seleccionarColorModal(index, nombre, stock) {
            // Remover selección anterior
            document.querySelectorAll('.color-card').forEach(card => {
                card.classList.remove('selected');
            });
            
            // Marcar seleccionado
            event.currentTarget.classList.add('selected');
            
            // Guardar selección
            window.modalSeleccion.colorIndex = index;
            window.modalSeleccion.colorNombre = nombre;
            window.modalSeleccion.stock = stock;
            
            // Actualizar texto
            const colorText = document.getElementById('selected-color-text');
            if (colorText) colorText.innerHTML = nombre;
        }

        // ============================================
        // CONSULTAR POR WHATSAPP
        // ============================================

        function consultarProductoWhatsApp() {
            if (!window.modalProductoActual) return;
            
            const producto = window.modalProductoActual;
            const seleccion = window.modalSeleccion;
            
            let mensaje = `🌸 MODAS LA 34 🌸\n\n`;
            mensaje += `Me interesa este producto:\n`;
            mensaje += `📦 *${producto.nombre}*\n`;
            
            if (seleccion.talla) {
                mensaje += `📏 Talla: *${seleccion.talla}*\n`;
            }
            if (seleccion.colorNombre && seleccion.colorNombre !== 'Sin color') {
                mensaje += `🎨 Color: *${seleccion.colorNombre}*\n`;
            }
            if (seleccion.precio) {
                mensaje += `💰 Precio: *$${seleccion.precio.toLocaleString()}*\n`;
            }
            
            mensaje += `\n¿Podrían darme más información sobre disponibilidad?`;
            
            const numeroWhatsApp = "573208049635";
            const url = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }

        // ============================================
        // CERRAR MODAL
        // ============================================

        function cerrarModal() {
            const modal = document.getElementById('modal-producto');
            if (modal) {
                modal.classList.remove('active');
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
            productoActual = null;
        }

        // ============================================
        // BUSCADOR
        // ============================================

        function configurarBuscador() {
            const buscador = document.getElementById('buscador-productos');
            if (!buscador) return;
            
            buscador.addEventListener('input', (e) => {
                const busqueda = e.target.value.toLowerCase().trim();
                
                if (busqueda === '') {
                    mostrarProductos(categoriaActual);
                } else {
                    const productosFiltrados = todosLosProductos.filter(p => {
                        if (p.nombre?.toLowerCase().includes(busqueda)) return true;
                        if (p.categoria?.toLowerCase().includes(busqueda)) return true;
                        
                        const variantes = p.variantes || [];
                        for (const v of variantes) {
                            if (v.talla?.toLowerCase().includes(busqueda)) return true;
                            const colores = v.colores || [];
                            for (const c of colores) {
                                if (c.nombre?.toLowerCase().includes(busqueda)) return true;
                            }
                        }
                        return false;
                    });
                    
                    const catalogo = document.getElementById('catalogo-productos');
                    if (!catalogo) return;
                    
                    if (productosFiltrados.length === 0) {
                        catalogo.innerHTML = `
                            <div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: #a5a5a5;">
                                🔍 No se encontraron productos para "${busqueda}"
                            </div>
                        `;
                    } else {
                        const categoriaOriginal = categoriaActual;
                        categoriaActual = 'todos';
                        const productosOriginal = todosLosProductos;
                        todosLosProductos = productosFiltrados;
                        mostrarProductos('todos');
                        todosLosProductos = productosOriginal;
                        categoriaActual = categoriaOriginal;
                    }
                }
            });
        }

        // ============================================
        // EVENTOS DEL MODAL
        // ============================================

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modal-producto');
            if (event.target === modal) {
                cerrarModal();
            }
        };

        // Cerrar modal con ESC
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                cerrarModal();
            }
        });

        // Cerrar dropdown al hacer clic fuera
        document.addEventListener('click', function(e) {
            const dropdown = document.querySelector('.dropdown');
            if (dropdown && !dropdown.contains(e.target)) {
                const content = dropdown.querySelector('.dropdown-content');
                if (content) content.style.display = 'none';
            }
        });

        // Menú móvil - toggle dropdown
        document.addEventListener('DOMContentLoaded', function() {
            const dropbtn = document.querySelector('.dropbtn');
            if (dropbtn && window.innerWidth <= 768) {
                dropbtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const content = document.querySelector('.dropdown-content');
                    if (content) {
                        content.style.display = content.style.display === 'block' ? 'none' : 'block';
                    }
                });
            }
        });

        // ============================================
        // INICIALIZACIÓN
        // ============================================

        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Catálogo iniciado');
            await cargarProductos();
            configurarBuscador();
        });

        console.log('✅ catalogo.js cargado correctamente');
    </script>
</body>
</html>
