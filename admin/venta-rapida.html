<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Venta Rápida - Mi Local de Ropa</title>
    <link rel="stylesheet" href="../css/estilo-comun.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #fff9fc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .venta-header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
        }

        .venta-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volver-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .volver-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Contenedor principal */
        .venta-container {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
        }

        /* Panel izquierdo - Productos */
        .productos-panel {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2);
            border: 1px solid #ffe4e9;
        }

        .buscador {
            margin-bottom: 1.5rem;
        }

        .buscador input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ffe4e9;
            border-radius: 50px;
            font-size: 1rem;
            background: #fff9fc;
            transition: all 0.3s;
        }

        .buscador input:focus {
            outline: none;
            border-color: #ffb6c1;
            box-shadow: 0 0 0 4px rgba(255, 182, 193, 0.2);
        }

        .categorias {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .categoria-btn {
            background: #fff0f3;
            border: 2px solid #ffe4e9;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #ff6b6b;
            transition: all 0.3s;
        }

        .categoria-btn:hover {
            background: #ffb6c1;
            color: white;
            border-color: #ff9a9e;
        }

        .categoria-btn.active {
            background: #ffb6c1;
            color: white;
            border-color: #ff9a9e;
        }

        .grid-productos-venta {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .producto-card-venta {
            background: #fff9fc;
            border: 2px solid #ffe4e9;
            border-radius: 20px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .producto-card-venta:hover {
            transform: translateY(-5px);
            border-color: #ff9a9e;
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.3);
        }

        .producto-card-venta h4 {
            color: #ff6b6b;
            margin: 0.5rem 0;
        }

        .producto-precio {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff9a9e;
        }

        .producto-stock {
            font-size: 0.8rem;
            color: #a5a5a5;
        }

        .producto-stock.bajo {
            color: #ff4757;
            font-weight: 600;
        }

        /* Panel derecho - Carrito */
        .carrito-panel {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2);
            border: 1px solid #ffe4e9;
            display: flex;
            flex-direction: column;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #ffe4e9;
        }

        .carrito-header h2 {
            color: #ff6b6b;
            font-size: 1.5rem;
        }

        .carrito-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .carrito-item {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 0.8rem;
            align-items: center;
            padding: 0.8rem;
            background: #fff9fc;
            border-radius: 15px;
            margin-bottom: 0.5rem;
            border: 1px solid #ffe4e9;
        }

        .item-cantidad {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .item-cantidad button {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: none;
            background: #ffb6c1;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .item-cantidad span {
            min-width: 30px;
            text-align: center;
        }

        .item-nombre {
            font-weight: 600;
            color: #4a4a4a;
        }

        .item-precio {
            color: #ff9a9e;
            font-weight: 600;
        }

        .item-eliminar {
            background: none;
            border: none;
            color: #ffb6c1;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .item-eliminar:hover {
            color: #ff4757;
        }

        .carrito-resumen {
            border-top: 2px solid #ffe4e9;
            padding-top: 1rem;
        }

        .resumen-linea {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            color: #4a4a4a;
        }

        .resumen-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6b6b;
            margin: 1rem 0;
        }

        .metodo-pago {
            margin: 1rem 0;
        }

        .metodo-pago select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ffe4e9;
            border-radius: 15px;
            background: #fff9fc;
            font-size: 1rem;
            color: #4a4a4a;
        }

        .finalizar-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .finalizar-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 154, 158, 0.4);
        }

        .finalizar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cancelar-btn {
            background: #ffe4e9;
            color: #ff6b6b;
            border: 2px solid #ffb6c1;
            padding: 0.8rem;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* Modal de factura */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            color: #ff6b6b;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }

        .modal-icon {
            font-size: 4rem;
            margin: 1rem 0;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-imprimir {
            background: #ff9a9e;
            color: white;
        }

        .btn-nueva {
            background: #ffe4e9;
            color: #ff6b6b;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .venta-container {
                grid-template-columns: 1fr;
            }
            
            .carrito-panel {
                position: static;
            }
        }
    </style>
</head>
<body>
    <header class="venta-header">
        <h1>
            🛍️ VENTA RÁPIDA
            <span>🌸 Mi Local de Ropa</span>
        </h1>
        <a href="dashboard.html" class="volver-btn">← Volver al Dashboard</a>
    </header>

    <div class="venta-container">
        <!-- Panel izquierdo: Productos -->
        <div class="productos-panel">
            <h2 style="color: #ff6b6b; margin-bottom: 1.5rem;">Productos Disponibles</h2>
            
            <div class="buscador">
                <input type="text" id="buscador" placeholder="🔍 Buscar producto por nombre o código...">
            </div>

            <div class="categorias" id="categorias">
                <button class="categoria-btn active" onclick="filtrarPorCategoria('todos')">Todos</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('Camisa')">Camisas</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('Pantalón')">Pantalones</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('Vestido')">Vestidos</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('Accesorio')">Accesorios</button>
            </div>

            <div class="grid-productos-venta" id="grid-productos">
                <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
                    Cargando productos...
                </div>
            </div>
        </div>

        <!-- Panel derecho: Carrito -->
        <div class="carrito-panel">
            <div class="carrito-header">
                <h2>🛒 Carrito</h2>
                <span id="carrito-cantidad" style="background: #ffb6c1; color: white; padding: 0.3rem 0.8rem; border-radius: 50px;">0</span>
            </div>

            <div class="carrito-items" id="carrito-items">
                <div style="text-align: center; color: #a5a5a5; padding: 2rem;">
                    El carrito está vacío
                </div>
            </div>

            <div class="carrito-resumen">
                <div class="resumen-linea">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0</span>
                </div>
                <div class="resumen-linea">
                    <span>IVA (19%):</span>
                    <span id="iva">$0</span>
                </div>
                <div class="resumen-total">
                    <span>TOTAL:</span>
                    <span id="total">$0</span>
                </div>

                <div class="metodo-pago">
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Tarjeta Débito">💳 Tarjeta Débito</option>
                        <option value="Tarjeta Crédito">💳 Tarjeta Crédito</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Nequi">📱 Nequi</option>
                    </select>
                </div>

                <button class="finalizar-btn" id="finalizar-btn" onclick="finalizarVenta()" disabled>
                    Finalizar Venta
                </button>
                <button class="cancelar-btn" onclick="limpiarCarrito()">
                    Vaciar Carrito
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de factura -->
    <div class="modal" id="modal-factura">
        <div class="modal-content">
            <div class="modal-icon">🧾</div>
            <h3>¡Venta Completada!</h3>
            <p style="margin: 1rem 0; color: #4a4a4a;">La venta se ha registrado exitosamente.</p>
            <div style="background: #fff9fc; padding: 1rem; border-radius: 15px; margin: 1rem 0;">
                <p><strong>Total:</strong> <span id="factura-total">$0</span></p>
                <p><strong>Método de pago:</strong> <span id="factura-metodo">Efectivo</span></p>
            </div>
            <div class="modal-buttons">
                <button class="btn-imprimir" onclick="imprimirFactura()">🖨️ Imprimir</button>
                <button class="btn-nueva" onclick="nuevaVenta()">➕ Nueva Venta</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script>
        // Variables globales
        let productos = [];
        let carrito = [];
        let filtroActual = 'todos';
        let busquedaActual = '';

        // Cargar productos al iniciar
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarSesion();
            await cargarProductos();
        });

        // Verificar sesión
        async function verificarSesion() {
            const tokenData = localStorage.getItem('admin_token');
            if (!tokenData) {
                window.location.href = 'login.html';
                return;
            }
        }

        // Cargar productos desde Supabase
        async function cargarProductos() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/productos?select=*&stock_actual.gt.0&order=nombre`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                productos = await response.json();
                mostrarProductos();
            } catch (error) {
                console.error('Error cargando productos:', error);
            }
        }

        // Mostrar productos según filtros
        function mostrarProductos() {
            const grid = document.getElementById('grid-productos');
            
            let productosFiltrados = productos;
            
            // Filtrar por categoría
            if (filtroActual !== 'todos') {
                productosFiltrados = productosFiltrados.filter(p => 
                    p.nombre.includes(filtroActual) || p.categoria?.includes(filtroActual)
                );
            }
            
            // Filtrar por búsqueda
            if (busquedaActual) {
                productosFiltrados = productosFiltrados.filter(p => 
                    p.nombre.toLowerCase().includes(busquedaActual.toLowerCase()) ||
                    p.codigo.toLowerCase().includes(busquedaActual.toLowerCase())
                );
            }

            if (productosFiltrados.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: #a5a5a5;">No hay productos disponibles</div>';
                return;
            }

            grid.innerHTML = productosFiltrados.map(p => `
                <div class="producto-card-venta" onclick="agregarAlCarrito(${p.id})">
                    <div style="font-size: 2rem;">👕</div>
                    <h4>${p.nombre}</h4>
                    <div class="producto-precio">$${(p.precio_venta || 0).toLocaleString()}</div>
                    <div class="producto-stock ${p.stock_actual < 5 ? 'bajo' : ''}">
                        Stock: ${p.stock_actual}
                    </div>
                </div>
            `).join('');
        }

        // Filtrar por categoría
        function filtrarPorCategoria(categoria) {
            filtroActual = categoria;
            
            // Actualizar botones activos
            document.querySelectorAll('.categoria-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            mostrarProductos();
        }

        // Buscador
        document.getElementById('buscador').addEventListener('input', (e) => {
            busquedaActual = e.target.value;
            mostrarProductos();
        });

        // Agregar al carrito
        function agregarAlCarrito(productoId) {
            const producto = productos.find(p => p.id === productoId);
            
            if (!producto) return;
            
            if (producto.stock_actual <= 0) {
                alert('❌ Producto sin stock');
                return;
            }
            
            const itemExistente = carrito.find(i => i.id === productoId);
            
            if (itemExistente) {
                if (itemExistente.cantidad < producto.stock_actual) {
                    itemExistente.cantidad++;
                } else {
                    alert('❌ Stock insuficiente');
                    return;
                }
            } else {
                carrito.push({
                    id: producto.id,
                    nombre: producto.nombre,
                    precio: producto.precio_venta,
                    cantidad: 1,
                    stock: producto.stock_actual
                });
            }
            
            actualizarCarrito();
        }

        // Actualizar visualización del carrito
        function actualizarCarrito() {
            const carritoDiv = document.getElementById('carrito-items');
            const cantidadSpan = document.getElementById('carrito-cantidad');
            const subtotalSpan = document.getElementById('subtotal');
            const ivaSpan = document.getElementById('iva');
            const totalSpan = document.getElementById('total');
            const finalizarBtn = document.getElementById('finalizar-btn');
            
            if (carrito.length === 0) {
                carritoDiv.innerHTML = '<div style="text-align: center; color: #a5a5a5; padding: 2rem;">El carrito está vacío</div>';
                finalizarBtn.disabled = true;
            } else {
                carritoDiv.innerHTML = carrito.map(item => `
                    <div class="carrito-item">
                        <div class="item-cantidad">
                            <button onclick="cambiarCantidad(${item.id}, -1)">-</button>
                            <span>${item.cantidad}</span>
                            <button onclick="cambiarCantidad(${item.id}, 1)">+</button>
                        </div>
                        <span class="item-nombre">${item.nombre}</span>
                        <span class="item-precio">$${(item.precio * item.cantidad).toLocaleString()}</span>
                        <button class="item-eliminar" onclick="eliminarDelCarrito(${item.id})">🗑️</button>
                    </div>
                `).join('');
                finalizarBtn.disabled = false;
            }
            
            const cantidadTotal = carrito.reduce((sum, i) => sum + i.cantidad, 0);
            cantidadSpan.textContent = cantidadTotal;
            
            const subtotal = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            const iva = subtotal * 0.19;
            const total = subtotal + iva;
            
            subtotalSpan.textContent = `$${subtotal.toLocaleString()}`;
            ivaSpan.textContent = `$${iva.toLocaleString()}`;
            totalSpan.textContent = `$${total.toLocaleString()}`;
        }

        // Cambiar cantidad en el carrito
        function cambiarCantidad(productoId, delta) {
            const item = carrito.find(i => i.id === productoId);
            if (!item) return;
            
            const nuevaCantidad = item.cantidad + delta;
            
            if (nuevaCantidad <= 0) {
                eliminarDelCarrito(productoId);
            } else if (nuevaCantidad <= item.stock) {
                item.cantidad = nuevaCantidad;
                actualizarCarrito();
            } else {
                alert('❌ Stock insuficiente');
            }
        }

        // Eliminar del carrito
        function eliminarDelCarrito(productoId) {
            carrito = carrito.filter(i => i.id !== productoId);
            actualizarCarrito();
        }

        // Limpiar carrito
        function limpiarCarrito() {
            if (carrito.length > 0 && confirm('¿Vaciar el carrito?')) {
                carrito = [];
                actualizarCarrito();
            }
        }

        // Finalizar venta
        async function finalizarVenta() {
            if (carrito.length === 0) {
                alert('❌ El carrito está vacío');
                return;
            }
            
            const metodoPago = document.getElementById('metodo-pago').value;
            const subtotal = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            const iva = subtotal * 0.19;
            const total = subtotal + iva;
            
            if (!confirm(`¿Confirmar venta por $${total.toLocaleString()}?`)) {
                return;
            }
            
            try {
                const token = JSON.parse(localStorage.getItem('admin_token'));
                
                // 1. Crear la venta
                const ventaResponse = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token.access_token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        total: total,
                        metodo_pago: metodoPago,
                        productos: carrito.map(i => `${i.cantidad}x ${i.nombre}`).join(', '),
                        vendedor_id: currentUser?.id || null
                    })
                });
                
                const venta = await ventaResponse.json();
                
                // 2. Guardar detalles y actualizar stock
                for (const item of carrito) {
                    // Guardar detalle
                    await fetch(`${SUPABASE_URL}/rest/v1/detalle_ventas`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${token.access_token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            venta_id: venta[0].id,
                            producto_id: item.id,
                            cantidad: item.cantidad,
                            precio_unitario: item.precio,
                            subtotal: item.precio * item.cantidad
                        })
                    });
                    
                    // Actualizar stock
                    const producto = productos.find(p => p.id === item.id);
                    const nuevoStock = producto.stock_actual - item.cantidad;
                    
                    await fetch(`${SUPABASE_URL}/rest/v1/productos?id=eq.${item.id}`, {
                        method: 'PATCH',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${token.access_token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            stock_actual: nuevoStock
                        })
                    });
                }
                
                // Mostrar modal de factura
                document.getElementById('factura-total').textContent = `$${total.toLocaleString()}`;
                document.getElementById('factura-metodo').textContent = metodoPago;
                document.getElementById('modal-factura').classList.add('active');
                
                // Recargar productos (para actualizar stock)
                await cargarProductos();
                
            } catch (error) {
                console.error('Error al finalizar venta:', error);
                alert('❌ Error al procesar la venta');
            }
        }

        // Imprimir factura
        function imprimirFactura() {
            const total = document.getElementById('factura-total').textContent;
            const metodo = document.getElementById('factura-metodo').textContent;
            
            const facturaHTML = `
                <html>
                <head>
                    <title>Factura de Venta</title>
                    <style>
                        body { font-family: 'Courier New', monospace; max-width: 300px; margin: 0 auto; padding: 20px; }
                        h2 { text-align: center; color: #ff6b6b; }
                        table { width: 100%; border-collapse: collapse; }
                        th, td { padding: 5px; text-align: left; }
                        .total { font-weight: bold; border-top: 1px dashed #000; }
                    </style>
                </head>
                <body>
                    <h2>🌸 MI LOCAL DE ROPA</h2>
                    <p>Fecha: ${new Date().toLocaleString()}</p>
                    <hr>
                    <table>
                        ${carrito.map(item => `
                            <tr>
                                <td>${item.cantidad}x ${item.nombre}</td>
                                <td>$${(item.precio * item.cantidad).toLocaleString()}</td>
                            </tr>
                        `).join('')}
                    </table>
                    <hr>
                    <p><strong>Subtotal:</strong> $${(carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0)).toLocaleString()}</p>
                    <p><strong>IVA 19%:</strong> $${(carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0) * 0.19).toLocaleString()}</p>
                    <p class="total"><strong>TOTAL: ${total}</strong></p>
                    <p>Método de pago: ${metodo}</p>
                    <hr>
                    <p style="text-align: center;">¡Gracias por su compra!</p>
                </body>
                </html>
            `;
            
            const ventana = window.open('', '_blank');
            ventana.document.write(facturaHTML);
            ventana.print();
        }

        // Nueva venta
        function nuevaVenta() {
            document.getElementById('modal-factura').classList.remove('active');
            carrito = [];
            actualizarCarrito();
        }
    </script>
</body>
</html>
