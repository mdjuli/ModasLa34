<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>🌸 Venta Rápida - Modas La 34</title>
    <link rel="stylesheet" href="../css/estilo-comun.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
        }

        body {
            background: #fff9fc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .venta-header {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 154, 158, 0.3);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .venta-header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volver-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .volver-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .venta-container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            flex: 1;
        }

        .productos-panel {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2);
            border: 1px solid #ffe4e9;
        }

        .buscador {
            margin-bottom: 1.5rem;
        }

        .buscador input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #ffe4e9;
            border-radius: 50px;
            font-size: 1rem;
            background: #fff9fc;
        }

        .categorias {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .categoria-btn {
            background: #fff0f3;
            border: 2px solid #ffe4e9;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #ff6b6b;
            transition: all 0.3s;
        }

        .categoria-btn:hover, .categoria-btn.active {
            background: #ffb6c1;
            color: white;
        }

        .grid-productos-venta {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            max-height: 600px;
            overflow-y: auto;
        }

        .producto-card-venta {
            background: #fff9fc;
            border: 2px solid #ffe4e9;
            border-radius: 20px;
            padding: 1rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .producto-card-venta:hover {
            transform: translateY(-5px);
            border-color: #ff9a9e;
            box-shadow: 0 5px 15px rgba(255, 154, 158, 0.3);
        }

        .producto-card-venta h4 {
            color: #ff6b6b;
            margin: 0.5rem 0;
        }

        .producto-precio {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff9a9e;
        }

        .producto-stock {
            font-size: 0.8rem;
            color: #a5a5a5;
        }

        .producto-stock.bajo {
            color: #ff4757;
        }

        .carrito-panel {
            background: white;
            border-radius: 25px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.2);
            border: 1px solid #ffe4e9;
            position: sticky;
            top: 2rem;
            height: fit-content;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #ffe4e9;
        }

        .carrito-header h2 {
            color: #ff6b6b;
            font-size: 1.5rem;
        }

        .selector-iva {
            background: #fff0f3;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .selector-iva h3 {
            color: #ff6b6b;
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }

        .iva-opciones {
            display: flex;
            gap: 0.5rem;
        }

        .iva-opcion {
            flex: 1;
        }

        .iva-opcion input[type="radio"] {
            display: none;
        }

        .iva-opcion label {
            display: block;
            text-align: center;
            padding: 0.5rem;
            background: white;
            border: 2px solid #ffe4e9;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .iva-opcion input[type="radio"]:checked + label {
            background: #ffb6c1;
            color: white;
        }

        .carrito-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .carrito-item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 0.8rem;
            align-items: center;
            padding: 1rem;
            background: #fff9fc;
            border-radius: 15px;
            margin-bottom: 0.8rem;
            border: 1px solid #ffe4e9;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }

        .item-nombre {
            font-weight: 600;
            color: #ff6b6b;
        }

        .item-detalle {
            font-size: 0.8rem;
            color: #a5a5a5;
        }

        .item-precio-input {
            width: 100px;
            padding: 0.3rem;
            border: 2px solid #ffe4e9;
            border-radius: 8px;
            text-align: right;
        }

        .item-cantidad {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .item-cantidad button {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: none;
            background: #ffb6c1;
            color: white;
            cursor: pointer;
        }

        .item-cantidad span {
            min-width: 30px;
            text-align: center;
        }

        .item-eliminar {
            background: none;
            border: none;
            color: #ffb6c1;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .item-eliminar:hover {
            color: #ff4757;
        }

        .carrito-resumen {
            border-top: 2px solid #ffe4e9;
            padding-top: 1rem;
        }

        .resumen-linea {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }

        .resumen-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ff6b6b;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 2px solid #ffe4e9;
            border-bottom: 2px solid #ffe4e9;
        }

        .metodo-pago select {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #ffe4e9;
            border-radius: 15px;
            background: #fff9fc;
            margin: 1rem 0;
        }

        .finalizar-btn {
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .finalizar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .cancelar-btn {
            background: #ffe4e9;
            color: #ff6b6b;
            border: 2px solid #ffb6c1;
            padding: 0.8rem;
            border-radius: 50px;
            width: 100%;
            margin-top: 0.5rem;
            cursor: pointer;
        }

        .modal-variantes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .modal-variantes-contenido {
            background: white;
            border-radius: 25px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .variante-opcion {
            border: 2px solid #ffe4e9;
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: all 0.3s;
        }

        .variante-opcion:hover {
            border-color: #ff9a9e;
            background: #fff9fc;
        }

        .variante-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }

        .variante-info {
            flex: 1;
        }

        .variante-precio {
            font-weight: bold;
            color: #ff9a9e;
        }

        .modal-factura {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-factura.active {
            display: flex;
        }

        .modal-factura-contenido {
            background: white;
            border-radius: 25px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-icon {
            font-size: 4rem;
            margin: 1rem 0;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .modal-buttons button {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-imprimir {
            background: #ff9a9e;
            color: white;
        }

        .btn-nueva {
            background: #ffe4e9;
            color: #ff6b6b;
        }

        @media (max-width: 900px) {
            .venta-container {
                grid-template-columns: 1fr;
            }
            .carrito-panel {
                position: static;
            }
        }

        @media print {
            body * {
                visibility: hidden;
            }
            .factura-print, .factura-print * {
                visibility: visible;
            }
            .factura-print {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="venta-header">
        <h1>🛍️ VENTA RÁPIDA <span>🌸 Modas La 34</span></h1>
        <a href="dashboard.html" class="volver-btn">← Volver al Dashboard</a>
    </header>

    <div class="venta-container">
        <div class="productos-panel">
            <h2 style="color: #ff6b6b; margin-bottom: 1.5rem;">Productos Disponibles</h2>
            <div class="buscador">
                <input type="text" id="buscador" placeholder="🔍 Buscar producto...">
            </div>
            <div class="categorias" id="categorias">
                <button class="categoria-btn active" onclick="filtrarPorCategoria('todos')">Todos</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('vestidos')">👗 Vestidos</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('blusas')">👚 Blusas</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('pantalones')">👖 Pantalones</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('deportivo')">⚽ Deportivo</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('caballero')">👔 Caballero</button>
                <button class="categoria-btn" onclick="filtrarPorCategoria('accesorios')">🎀 Accesorios</button>
            </div>
            <div class="grid-productos-venta" id="grid-productos">
                <div style="text-align:center; padding:2rem;">Cargando productos...</div>
            </div>
        </div>

        <div class="carrito-panel">
            <div class="carrito-header">
                <h2>🛒 Carrito</h2>
                <span id="carrito-cantidad" style="background:#ffb6c1; color:white; padding:0.3rem 0.8rem; border-radius:50px;">0</span>
            </div>

            <div class="selector-iva">
                <h3>📊 IVA incluido en los precios:</h3>
                <div class="iva-opciones">
                    <div class="iva-opcion"><input type="radio" name="tipo-iva" id="iva-0" value="0" checked><label for="iva-0">Exento (0%)</label></div>
                    <div class="iva-opcion"><input type="radio" name="tipo-iva" id="iva-5" value="5"><label for="iva-5">5%</label></div>
                    <div class="iva-opcion"><input type="radio" name="tipo-iva" id="iva-19" value="19"><label for="iva-19">19%</label></div>
                </div>
                <p style="font-size:0.7rem; color:#a5a5a5;">El IVA se extrae del precio de venta</p>
            </div>

            <div class="carrito-items" id="carrito-items">
                <div style="text-align:center; color:#a5a5a5; padding:2rem;">Carrito vacío</div>
            </div>

            <div class="carrito-resumen">
                <div class="resumen-linea"><span>Subtotal (Base):</span><span id="subtotal">$0</span></div>
                <div class="resumen-linea" id="iva-linea" style="display:none;"><span>IVA <span id="iva-porcentaje">0</span>%:</span><span id="iva-valor">$0</span></div>
                <div class="resumen-total"><span>TOTAL:</span><span id="total">$0</span></div>

                <div class="metodo-pago">
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Tarjeta Débito">💳 Tarjeta Débito</option>
                        <option value="Tarjeta Crédito">💳 Tarjeta Crédito</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Nequi">📱 Nequi</option>
                    </select>
                </div>

                <button class="finalizar-btn" id="finalizar-btn" onclick="finalizarVenta()" disabled>Finalizar Venta</button>
                <button class="cancelar-btn" onclick="limpiarCarrito()">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <div class="modal-factura" id="modal-factura">
        <div class="modal-factura-contenido">
            <div class="modal-icon">🧾</div>
            <h3>¡Venta Completada!</h3>
            <div style="background:#fff9fc; padding:1rem; border-radius:15px; margin:1rem 0;">
                <p><strong>Total:</strong> <span id="factura-total">$0</span></p>
                <p><strong>IVA:</strong> <span id="factura-iva">0%</span></p>
                <p><strong>Método:</strong> <span id="factura-metodo">Efectivo</span></p>
            </div>
            <div class="modal-buttons">
                <button class="btn-imprimir" onclick="abrirFacturaImprimir()">🖨️ Imprimir</button>
                <button class="btn-nueva" onclick="nuevaVenta()">➕ Nueva Venta</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script>
        // ============================================
        // VARIABLES GLOBALES
        // ============================================
        let todosLosProductos = [];
        let carrito = [];
        let filtroActual = 'todos';
        let busquedaActual = '';
        let ventaActualId = null;

        // ============================================
        // AUTENTICACIÓN Y TOKEN
        // ============================================
        async function obtenerTokenValido() {
            const tokenData = localStorage.getItem('admin_token');
            if (!tokenData) {
                window.location.href = 'login.html';
                return null;
            }
            try {
                const token = JSON.parse(tokenData);
                if (token.expires_at) {
                    const expiracion = new Date(token.expires_at);
                    const ahora = new Date();
                    if (ahora > expiracion) {
                        console.log('Token expirado, refrescando...');
                        const refreshResponse = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
                            method: 'POST',
                            headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ refresh_token: token.refresh_token })
                        });
                        if (refreshResponse.ok) {
                            const nuevoToken = await refreshResponse.json();
                            localStorage.setItem('admin_token', JSON.stringify(nuevoToken));
                            return nuevoToken;
                        } else {
                            localStorage.removeItem('admin_token');
                            window.location.href = 'login.html';
                            return null;
                        }
                    }
                }
                return token;
            } catch (error) {
                console.error('Error verificando token:', error);
                localStorage.removeItem('admin_token');
                window.location.href = 'login.html';
                return null;
            }
        }

        async function verificarSesion() {
            const token = await obtenerTokenValido();
            if (!token) return false;
            try {
                const response = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token.access_token}` }
                });
                if (!response.ok) throw new Error('Sesión inválida');
                return true;
            } catch (error) {
                localStorage.removeItem('admin_token');
                window.location.href = 'login.html';
                return false;
            }
        }

        // ============================================
        // CARGAR PRODUCTOS
        // ============================================
        async function cargarProductos() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/vista_productos_completa?order=nombre`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                if (!response.ok) throw new Error('Error al cargar productos');
                todosLosProductos = await response.json();
                mostrarProductos();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('grid-productos').innerHTML = '<div style="text-align:center;padding:2rem;color:#ff4757;">Error al cargar productos</div>';
            }
        }

        function mostrarProductos() {
            const grid = document.getElementById('grid-productos');
            let filtrados = todosLosProductos;
            if (filtroActual !== 'todos') filtrados = filtrados.filter(p => p.categoria === filtroActual);
            if (busquedaActual) filtrados = filtrados.filter(p => p.nombre.toLowerCase().includes(busquedaActual) || p.codigo.toLowerCase().includes(busquedaActual));

            if (filtrados.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:2rem;">No hay productos</div>';
                return;
            }

            grid.innerHTML = filtrados.map(p => `
                <div class="producto-card-venta" onclick="seleccionarProducto(${p.id})">
                    <div style="font-size:2rem;">${p.categoria === 'vestidos' ? '👗' : p.categoria === 'blusas' ? '👚' : p.categoria === 'pantalones' ? '👖' : '📦'}</div>
                    <h4>${p.nombre}</h4>
                    <div class="producto-precio">$${(p.precio_min || 0).toLocaleString()}</div>
                    <div class="producto-stock">Stock: ${p.stock_total || 0}</div>
                    <small>${p.codigo}</small>
                </div>
            `).join('');
        }

        function filtrarPorCategoria(categoria) {
            filtroActual = categoria;
            document.querySelectorAll('.categoria-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            mostrarProductos();
        }

        document.getElementById('buscador').addEventListener('input', (e) => {
            busquedaActual = e.target.value;
            mostrarProductos();
        });

        // ============================================
        // SELECCIONAR PRODUCTO Y VARIANTES
        // ============================================
        function seleccionarProducto(productoId) {
            const producto = todosLosProductos.find(p => p.id === productoId);
            if (!producto) return;
            const variantes = producto.variantes || [];
            if (variantes.length === 0) { alert('Sin variantes'); return; }

            let html = `<div class="modal-variantes" id="modal-variantes"><div class="modal-variantes-contenido"><h3>${producto.nombre}</h3>`;
            variantes.forEach(v => {
                const colores = v.colores || [];
                if (colores.length > 0) {
                    colores.forEach(color => {
                        if (color.stock > 0) {
                            html += `<div class="variante-opcion" onclick="agregarAlCarrito(${producto.id}, ${v.id}, '${v.talla}', '${color.nombre}', '${color.codigo}', ${v.precio_venta}, ${color.stock})">
                                <div class="variante-color" style="background:${color.codigo}"></div>
                                <div class="variante-info"><strong>Talla: ${v.talla}</strong> | Color: ${color.nombre}<br><span class="variante-precio">$${v.precio_venta.toLocaleString()}</span><br>Stock: ${color.stock}</div>
                            </div>`;
                        }
                    });
                } else if (v.stock_total > 0) {
                    html += `<div class="variante-opcion" onclick="agregarAlCarrito(${producto.id}, ${v.id}, '${v.talla}', 'Sin color', '#cccccc', ${v.precio_venta}, ${v.stock_total})">
                        <div class="variante-color" style="background:#cccccc"></div>
                        <div class="variante-info"><strong>Talla: ${v.talla}</strong> | Sin color<br><span class="variante-precio">$${v.precio_venta.toLocaleString()}</span><br>Stock: ${v.stock_total}</div>
                    </div>`;
                }
            });
            html += `<button onclick="document.getElementById('modal-variantes').remove()" style="width:100%; margin-top:1rem; padding:0.8rem; background:#ffe4e9; border:none; border-radius:50px;">Cancelar</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', html);
        }

        function agregarAlCarrito(productoId, varianteId, talla, colorNombre, colorCodigo, precioBase, stockMaximo) {
            const modal = document.getElementById('modal-variantes');
            if (modal) modal.remove();

            const producto = todosLosProductos.find(p => p.id === productoId);
            const existente = carrito.find(i => i.varianteId === varianteId);
            if (existente) {
                if (existente.cantidad < stockMaximo) existente.cantidad++;
                else { alert('Stock insuficiente'); return; }
            } else {
                carrito.push({ productoId, varianteId, nombre: producto?.nombre, talla, colorNombre, colorCodigo, precioBase, precioVenta: precioBase, cantidad: 1, stockMaximo });
            }
            actualizarCarrito();
        }

        // ============================================
        // CARRITO
        // ============================================
        function actualizarCarrito() {
            const container = document.getElementById('carrito-items');
            const cantidadSpan = document.getElementById('carrito-cantidad');
            const subtotalSpan = document.getElementById('subtotal');
            const ivaLinea = document.getElementById('iva-linea');
            const ivaPorcentaje = document.getElementById('iva-porcentaje');
            const ivaValor = document.getElementById('iva-valor');
            const totalSpan = document.getElementById('total');
            const finalizarBtn = document.getElementById('finalizar-btn');
            const porcentajeIVA = parseInt(document.querySelector('input[name="tipo-iva"]:checked').value);

            if (carrito.length === 0) {
                container.innerHTML = '<div style="text-align:center;color:#a5a5a5;padding:2rem;">Carrito vacío</div>';
                finalizarBtn.disabled = true;
                ivaLinea.style.display = 'none';
            } else {
                container.innerHTML = carrito.map((item, idx) => `
                    <div class="carrito-item">
                        <div class="item-cantidad"><button onclick="cambiarCantidad(${idx}, -1)">-</button><span>${item.cantidad}</span><button onclick="cambiarCantidad(${idx}, 1)">+</button></div>
                        <div class="item-info"><span class="item-nombre">${item.nombre}</span><span class="item-detalle">Talla: ${item.talla} | Color: <span style="display:inline-block;width:12px;height:12px;background:${item.colorCodigo};border-radius:50%;"></span> ${item.colorNombre}</span><input type="number" class="item-precio-input" value="${item.precioVenta}" onchange="cambiarPrecio(${idx}, this.value)"></div>
                        <button class="item-eliminar" onclick="eliminarDelCarrito(${idx})">🗑️</button>
                    </div>
                `).join('');
                finalizarBtn.disabled = false;
            }

            const cantidadTotal = carrito.reduce((s, i) => s + i.cantidad, 0);
            cantidadSpan.textContent = cantidadTotal;
            const subtotal = carrito.reduce((s, i) => s + (i.precioVenta * i.cantidad), 0);

            if (porcentajeIVA > 0) {
                const base = subtotal / (1 + porcentajeIVA / 100);
                const iva = subtotal - base;
                ivaPorcentaje.textContent = porcentajeIVA;
                ivaValor.textContent = `$${iva.toLocaleString()}`;
                ivaLinea.style.display = 'flex';
                subtotalSpan.textContent = `$${base.toLocaleString()}`;
                totalSpan.textContent = `$${subtotal.toLocaleString()}`;
            } else {
                ivaLinea.style.display = 'none';
                subtotalSpan.textContent = `$${subtotal.toLocaleString()}`;
                totalSpan.textContent = `$${subtotal.toLocaleString()}`;
            }
        }

        function cambiarPrecio(idx, nuevo) { carrito[idx].precioVenta = parseFloat(nuevo) || 0; actualizarCarrito(); }
        function cambiarCantidad(idx, delta) {
            const item = carrito[idx];
            const nueva = item.cantidad + delta;
            if (nueva <= 0) carrito.splice(idx, 1);
            else if (nueva <= item.stockMaximo) item.cantidad = nueva;
            else alert('Stock insuficiente');
            actualizarCarrito();
        }
        function eliminarDelCarrito(idx) { carrito.splice(idx, 1); actualizarCarrito(); }
        function limpiarCarrito() { if (confirm('¿Vaciar carrito?')) { carrito = []; actualizarCarrito(); } }

        // ============================================
        // FINALIZAR VENTA
        // ============================================
        async function finalizarVenta() {
            if (carrito.length === 0) { alert('Carrito vacío'); return; }
            const metodoPago = document.getElementById('metodo-pago').value;
            const porcentajeIVA = parseInt(document.querySelector('input[name="tipo-iva"]:checked').value);
            const subtotal = carrito.reduce((s, i) => s + (i.precioVenta * i.cantidad), 0);
            let base = subtotal, iva = 0;
            if (porcentajeIVA > 0) { base = subtotal / (1 + porcentajeIVA / 100); iva = subtotal - base; }
            if (!confirm(`Confirmar venta por $${subtotal.toLocaleString()}?`)) return;

            try {
                const token = await obtenerTokenValido();
                if (!token) return;

                const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token.access_token}` }
                });
                const user = await userRes.json();

                const ventaData = {
                    total: subtotal,
                    subtotal: Math.round(base),
                    iva: Math.round(iva),
                    iva_porcentaje: porcentajeIVA,
                    metodo_pago: metodoPago,
                    productos: carrito.map(i => `${i.cantidad}x ${i.nombre} (Talla: ${i.talla})`).join(', '),
                };

                const ventaRes = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token.access_token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(ventaData)
                });

                if (!ventaRes.ok) throw new Error(await ventaRes.text());
                const venta = await ventaRes.json();
                ventaActualId = venta[0].id;

                for (const item of carrito) {
                    await fetch(`${SUPABASE_URL}/rest/v1/detalle_ventas`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${token.access_token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            venta_id: ventaActualId,
                            producto_id: item.productoId,
                            variante_id: item.varianteId,
                            cantidad: item.cantidad,
                            precio_unitario: item.precioVenta,
                            subtotal: item.precioVenta * item.cantidad,
                            producto_nombre: item.nombre,
                            talla: item.talla,
                            color_nombre: item.colorNombre
                        })
                    });

                    const varRes = await fetch(`${SUPABASE_URL}/rest/v1/variantes_producto?id=eq.${item.varianteId}`, {
                        headers: { 'apikey': SUPABASE_KEY }
                    });
                    const varData = await varRes.json();
                    const variante = varData[0];
                    if (variante) {
                        const colores = variante.colores || [];
                        const idxColor = colores.findIndex(c => c.nombre === item.colorNombre);
                        if (idxColor >= 0) colores[idxColor].stock -= item.cantidad;
                        await fetch(`${SUPABASE_URL}/rest/v1/variantes_producto?id=eq.${item.varianteId}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_KEY,
                                'Authorization': `Bearer ${token.access_token}`,
                            },
                            body: JSON.stringify({
                                colores: colores,
                                stock_total: colores.reduce((s, c) => s + (c.stock || 0), 0)
                            })
                        });
                    }
                }

                document.getElementById('factura-total').textContent = `$${subtotal.toLocaleString()}`;
                document.getElementById('factura-iva').textContent = porcentajeIVA > 0 ? `${porcentajeIVA}%` : 'Exento';
                document.getElementById('factura-metodo').textContent = metodoPago;
                document.getElementById('modal-factura').classList.add('active');
                
                carrito = [];
                actualizarCarrito();
                await cargarProductos();

            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error: ' + error.message);
            }
        }

        function abrirFacturaImprimir() {
            if (ventaActualId) {
                window.open(`factura.html?id=${ventaActualId}`, '_blank');
                nuevaVenta();
            } else {
                alert('No se pudo generar la factura');
            }
        }

        function nuevaVenta() {
            document.getElementById('modal-factura').classList.remove('active');
            ventaActualId = null;
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modal-factura');
            if (event.target === modal) nuevaVenta();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            await verificarSesion();
            await cargarProductos();
            document.querySelectorAll('input[name="tipo-iva"]').forEach(r => r.addEventListener('change', () => actualizarCarrito()));
        });
    </script>
</body>
</html>
