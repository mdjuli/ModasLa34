<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración</title>
    <link rel="stylesheet" href="../css/estilo-comun.css">
    <style>
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #34495e;
            padding: 0.5rem 2rem;
        }
        
        .admin-nav a {
            color: white;
            margin-left: 1rem;
        }
        
        .btn-agregar {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin: 1rem 0;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #2c3e50;
            color: white;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }

        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }
        
        .card {
            background: white;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .card h3 {
            margin: 0;
            color: #666;
            font-size: 1rem;
        }
        
        .card-number {
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 0.5rem 0 0;
        }
    </style>
</head>
<body>
    <header class="admin-header">
        <h1>👑 Panel de Administración</h1>
        <div class="admin-nav">
            <a href="dashboard.html">Productos</a>
            <a href="#" onclick="logout()">Cerrar sesión</a>
        </div>
    </header>
    
    <main>
        <h2>Gestión de Productos</h2>
        
        <button class="btn-agregar" onclick="mostrarFormulario()">➕ Nuevo Producto</button>

       <div class="dashboard-cards">
            <div class="card">
                <h3>Total productos</h3>
                <p class="card-number" id="total-productos">-</p>
        </div>
        <div class="card">
            <h3>Stock bajo</h3>
            <p class="card-number" id="stock-bajo">-</p>
        </div>
        <div class="card">
            <h3>Valor inventario</h3>
            <p class="card-number" id="valor-inventario">-</p>
            </div>
        </div> 
        
        <div id="form-producto" style="display: none; background: #f9f9f9; padding: 1rem; margin: 1rem 0; border-radius: 4px;">
            <h3>Agregar producto</h3>
            <input type="text" id="nombre" placeholder="Nombre del producto" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
            <input type="number" id="precio" placeholder="Precio" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
            <input type="text" id="talla" placeholder="Talla" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
            <input type="text" id="color" placeholder="Color" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
            <input type="number" id="stock" placeholder="Stock inicial" style="width: 100%; padding: 0.5rem; margin: 0.5rem 0;">
            <button onclick="guardarProducto()" style="background-color: #27ae60; color: white; border: none; padding: 0.75rem; cursor: pointer;">Guardar producto</button>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Talla</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tabla-productos">
                <tr>
                    <td colspan="6" style="text-align: center;">Cargando productos...</td>
                </tr>
            </tbody>
        </table>
    </main>
    
    <script src="../js/supabase-config.js"></script>
    <script>
// Verificar autenticación
let token = localStorage.getItem('admin_token');

if (!token) {
    window.location.href = 'login.html';
}

// Configurar headers con autenticación
function getAuthHeaders() {
    const tokenData = JSON.parse(token);
    return {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${tokenData.access_token}`
    };
}

// Cargar productos
async function cargarProductos() {
    const tbody = document.getElementById('tabla-productos');
    
    try {
        const response = await supabaseFetch('/rest/v1/productos?order=id.desc', {
            headers: getAuthHeaders()
        });
        
        const productos = await response.json();
        
        tbody.innerHTML = productos.map(p => `
            <tr>
                <td>${p.id}</td>
                <td>${p.nombre}</td>
                <td>$${Number(p.precio_venta).toLocaleString()}</td>
                <td>${p.talla || '-'}</td>
                <td style="color: ${p.stock_actual <= p.stock_minimo ? 'red' : 'inherit'}; font-weight: ${p.stock_actual <= p.stock_minimo ? 'bold' : 'normal'}">
                    ${p.stock_actual}
                    ${p.stock_actual <= p.stock_minimo ? '⚠️' : ''}
                </td>
                <td>
                    <button onclick="editarProducto(${p.id})">✏️</button>
                    <button onclick="eliminarProducto(${p.id})">🗑️</button>
                </td>
            </tr>
        `).join('');
        
    } catch (error) {
        console.error('Error:', error);
        tbody.innerHTML = '<tr><td colspan="6">Error al cargar productos</td></tr>';
    }
}

// Guardar nuevo producto
async function guardarProducto() {
    const producto = {
        nombre: document.getElementById('nombre').value,
        precio_venta: parseFloat(document.getElementById('precio').value),
        talla: document.getElementById('talla').value,
        color: document.getElementById('color').value,
        stock_actual: parseInt(document.getElementById('stock').value)
    };
    
    try {
        const response = await supabaseFetch('/rest/v1/productos', {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify(producto)
        });
        
        if (response.ok) {
            alert('Producto guardado');
            document.getElementById('form-producto').style.display = 'none';
            // Limpiar campos
            ['nombre', 'precio', 'talla', 'color', 'stock'].forEach(id => 
                document.getElementById(id).value = ''
            );
            cargarProductos(); // Recargar lista
        } else {
            alert('Error al guardar');
        }
    } catch (error) {
        console.error('Error:', error);
        alert('Error de conexión');
    }
}

// Login real
async function loginAdmin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    const response = await supabaseFetch('/auth/v1/token?grant_type=password', {
        method: 'POST',
        body: JSON.stringify({ email, password })
    });
    
    if (response.ok) {
        const data = await response.json();
        localStorage.setItem('admin_token', JSON.stringify(data));
        window.location.href = 'dashboard.html';
    } else {
        alert('Credenciales incorrectas');
    }
}

// Logout
function logout() {
    localStorage.removeItem('admin_token');
    window.location.href = 'login.html';
}

// Mostrar formulario
function mostrarFormulario() {
    document.getElementById('form-producto').style.display = 'block';
}

// Cargar productos al iniciar
document.addEventListener('DOMContentLoaded', cargarProductos);
    </script>
</body>
</html>
