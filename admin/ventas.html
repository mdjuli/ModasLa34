<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>Venta Rápida - Modas La 34</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- Theme colors -->
<meta name="theme-color" content="#d4a5a9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Modas La 34">

<!-- Iconos para iOS -->
<link rel="apple-touch-icon" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
<link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png">
<link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">

<!-- Icono para Android -->
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8f6f4;
            color: #1a1a1a;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: white;
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-icon { font-size: 1.5rem; }
        .logo-text { font-weight: 600; font-size: 1.1rem; color: #333; }
        .volver-btn {
            background: #f5f5f5;
            color: #666;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .volver-btn:hover { background: #e0e0e0; }

        /* Contenedor principal */
        .venta-container {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 1.5rem;
            padding: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Panel productos */
        .productos-panel {
            background: white;
            border-radius: 20px;
            border: 1px solid #eee;
            padding: 1.2rem;
        }

        .productos-panel h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            color: #333;
        }

        .buscador {
            margin-bottom: 1rem;
        }
        .buscador input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .buscador input:focus { outline: none; border-color: #d4a5a9; }

        .categorias {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .cat-btn {
            background: #f5f5f5;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cat-btn:hover { background: #e0e0e0; }
        .cat-btn.active { background: #d4a5a9; color: white; }

        .grid-productos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.8rem;
            max-height: 500px;
            overflow-y: auto;
        }

        .producto-card {
            background: #fafafa;
            border-radius: 12px;
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #eee;
            text-align: center;
        }
        .producto-card:hover { background: #f0f0f0; transform: translateY(-2px); }
        .producto-nombre { font-weight: 600; font-size: 0.85rem; margin: 0.3rem 0; }
        .producto-precio { color: #d4a5a9; font-weight: 700; font-size: 1rem; }
        .producto-stock { font-size: 0.7rem; color: #999; }

        /* Panel carrito */
        .carrito-panel {
            background: white;
            border-radius: 20px;
            border: 1px solid #eee;
            padding: 1.2rem;
            position: sticky;
            top: 80px;
            height: fit-content;
        }

        .carrito-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid #eee;
        }
        .carrito-header h2 { font-size: 1.1rem; color: #333; }
        .carrito-cantidad {
            background: #d4a5a9;
            color: white;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .selector-iva {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 0.8rem;
            margin-bottom: 1rem;
        }
        .selector-iva h3 { font-size: 0.8rem; margin-bottom: 0.5rem; color: #666; }
        .iva-opciones { display: flex; gap: 0.5rem; }
        .iva-opcion {
            flex: 1;
            text-align: center;
            padding: 0.4rem;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }
        .iva-opcion.active { background: #d4a5a9; color: white; border-color: #d4a5a9; }

        .carrito-items {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        .carrito-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: #fafafa;
            border-radius: 10px;
            margin-bottom: 0.5rem;
        }
        .item-info { flex: 1; }
        .item-nombre { font-weight: 600; font-size: 0.85rem; }
        .item-detalle { font-size: 0.7rem; color: #999; }
        .item-precio { font-weight: 600; color: #d4a5a9; font-size: 0.85rem; }
        .item-cantidad {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0 0.5rem;
        }
        .item-cantidad button {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
        }
        .item-cantidad button:hover { background: #d4a5a9; color: white; }
        .item-eliminar {
            background: none;
            border: none;
            color: #ccc;
            cursor: pointer;
            font-size: 1rem;
        }
        .item-eliminar:hover { color: #e74c3c; }

        .carrito-resumen {
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }
        .resumen-linea {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }
        .resumen-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            color: #d4a5a9;
            margin: 1rem 0;
            padding-top: 0.5rem;
            border-top: 1px solid #eee;
        }
        .metodo-pago select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }
        .finalizar-btn {
            background: #d4a5a9;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 40px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .finalizar-btn:hover { background: #c49498; }
        .finalizar-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .vaciar-btn {
            background: none;
            border: 1px solid #e0e0e0;
            padding: 0.5rem;
            border-radius: 40px;
            width: 100%;
            margin-top: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
        }

        /* Modal factura */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-buttons button {
            flex: 1;
            padding: 0.7rem;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-imprimir { background: #d4a5a9; color: white; }
        .btn-nueva { background: #f0f0f0; color: #666; }

        /* Responsive */
        @media (max-width: 768px) {
            .venta-container { grid-template-columns: 1fr; }
            .carrito-panel { position: static; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="logo-icon">🌸</span>
            <span class="logo-text">Modas La 34 - Venta Rápida</span>
        </div>
        <a href="dashboard.html" class="volver-btn"><i class="fas fa-arrow-left"></i> Volver</a>
    </header>

    <div class="venta-container">
        <!-- Panel izquierdo: Productos -->
        <div class="productos-panel">
            <h2><i class="fas fa-search"></i> Productos Disponibles</h2>
            <div class="buscador">
                <input type="text" id="buscador" placeholder="🔍 Buscar producto...">
            </div>
            <div class="categorias" id="categorias">
                <button class="cat-btn active" data-cat="todos">Todos</button>
                <button class="cat-btn" data-cat="vestidos">👗 Vestidos</button>
                <button class="cat-btn" data-cat="blusas">👚 Blusas</button>
                <button class="cat-btn" data-cat="pantalones">👖 Pantalones</button>
                <button class="cat-btn" data-cat="deportivo">⚽ Deportivo</button>
                <button class="cat-btn" data-cat="caballero">👔 Caballero</button>
                <button class="cat-btn" data-cat="accesorios">🎀 Accesorios</button>
            </div>
            <div class="grid-productos" id="grid-productos">
                <div style="text-align:center; padding:2rem;">Cargando productos...</div>
            </div>
        </div>

        <!-- Panel derecho: Carrito -->
        <div class="carrito-panel">
            <div class="carrito-header">
                <h2><i class="fas fa-shopping-cart"></i> Carrito</h2>
                <span class="carrito-cantidad" id="carrito-cantidad">0</span>
            </div>

            <div class="selector-iva">
                <h3>📊 IVA incluido en los precios</h3>
                <div class="iva-opciones">
                    <div class="iva-opcion active" data-iva="0">Exento (0%)</div>
                    <div class="iva-opcion" data-iva="5">5%</div>
                    <div class="iva-opcion" data-iva="19">19%</div>
                </div>
            </div>

            <div class="carrito-items" id="carrito-items">
                <div style="text-align:center; color:#999; padding:2rem;">Carrito vacío</div>
            </div>

            <div class="carrito-resumen">
                <div class="resumen-linea">
                    <span>Subtotal (Base):</span>
                    <span id="subtotal">$0</span>
                </div>
                <div class="resumen-linea" id="iva-linea" style="display:none;">
                    <span>IVA <span id="iva-porcentaje">0</span>%:</span>
                    <span id="iva-valor">$0</span>
                </div>
                <div class="resumen-total">
                    <span>TOTAL:</span>
                    <span id="total">$0</span>
                </div>

                <div class="metodo-pago">
                    <select id="metodo-pago">
                        <option value="Efectivo">💵 Efectivo</option>
                        <option value="Tarjeta Débito">💳 Tarjeta Débito</option>
                        <option value="Tarjeta Crédito">💳 Tarjeta Crédito</option>
                        <option value="Transferencia">📱 Transferencia</option>
                        <option value="Nequi">📱 Nequi</option>
                        <option value="DaviPlata">📱 DaviPlata</option>
                    </select>
                </div>

                <button class="finalizar-btn" id="finalizar-btn" disabled>Finalizar Venta</button>
                <button class="vaciar-btn" onclick="limpiarCarrito()">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <!-- Modal factura -->
    <div class="modal" id="modal-factura">
        <div class="modal-content">
            <div style="font-size: 3rem;">🧾</div>
            <h3 style="margin: 1rem 0;">¡Venta Completada!</h3>
            <p>Total: <strong id="factura-total">$0</strong></p>
            <p>IVA: <span id="factura-iva">0%</span></p>
            <p>Método: <span id="factura-metodo">Efectivo</span></p>
            <div class="modal-buttons">
                <button class="btn-imprimir" onclick="imprimirFactura()">🖨️ Imprimir</button>
                <button class="btn-nueva" onclick="nuevaVenta()">➕ Nueva Venta</button>
            </div>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script>
        // Variables
        let productos = [];
        let carrito = [];
        let ivaSeleccionado = 0;
        let filtroCategoria = 'todos';
        let busqueda = '';

        // Elementos DOM
        const gridProductos = document.getElementById('grid-productos');
        const carritoItems = document.getElementById('carrito-items');
        const carritoCantidad = document.getElementById('carrito-cantidad');
        const subtotalSpan = document.getElementById('subtotal');
        const ivaLinea = document.getElementById('iva-linea');
        const ivaPorcentajeSpan = document.getElementById('iva-porcentaje');
        const ivaValorSpan = document.getElementById('iva-valor');
        const totalSpan = document.getElementById('total');
        const finalizarBtn = document.getElementById('finalizar-btn');

        // Inicializar
        document.addEventListener('DOMContentLoaded', async () => {
            await cargarProductos();
            configurarEventos();
        });

        async function cargarProductos() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/vista_productos_completa`, {
                    headers: { 'apikey': SUPABASE_KEY }
                });
                productos = await res.json();
                mostrarProductos();
            } catch (error) {
                console.error('Error:', error);
                gridProductos.innerHTML = '<div style="text-align:center; padding:2rem;">Error al cargar productos</div>';
            }
        }

        function mostrarProductos() {
            let filtrados = productos.filter(p => p.stock_total > 0);
            
            if (filtroCategoria !== 'todos') {
                filtrados = filtrados.filter(p => p.categoria === filtroCategoria);
            }
            if (busqueda) {
                filtrados = filtrados.filter(p => 
                    p.nombre.toLowerCase().includes(busqueda.toLowerCase()) ||
                    p.codigo.toLowerCase().includes(busqueda.toLowerCase())
                );
            }

            if (filtrados.length === 0) {
                gridProductos.innerHTML = '<div style="text-align:center; padding:2rem;">No hay productos disponibles</div>';
                return;
            }

            gridProductos.innerHTML = filtrados.map(p => `
                <div class="producto-card" onclick="seleccionarProducto(${p.id})">
                    <div style="font-size: 1.5rem;">📦</div>
                    <div class="producto-nombre">${p.nombre}</div>
                    <div class="producto-precio">$${(p.precio_min || 0).toLocaleString()}</div>
                    <div class="producto-stock">Stock: ${p.stock_total}</div>
                    <div style="font-size: 0.7rem; color:#999;">${p.codigo}</div>
                </div>
            `).join('');
        }

        function configurarEventos() {
            // Filtro categorías
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filtroCategoria = btn.dataset.cat;
                    mostrarProductos();
                });
            });

            // Buscador
            document.getElementById('buscador').addEventListener('input', (e) => {
                busqueda = e.target.value;
                mostrarProductos();
            });

            // Selector IVA
            document.querySelectorAll('.iva-opcion').forEach(opt => {
                opt.addEventListener('click', () => {
                    document.querySelectorAll('.iva-opcion').forEach(o => o.classList.remove('active'));
                    opt.classList.add('active');
                    ivaSeleccionado = parseInt(opt.dataset.iva);
                    actualizarCarrito();
                });
            });
        }

        async function seleccionarProducto(id) {
            const producto = productos.find(p => p.id === id);
            if (!producto) return;

            const variantes = producto.variantes || [];
            if (variantes.length === 0) {
                agregarAlCarrito(producto, null, producto.precio_min);
                return;
            }

            // Modal para seleccionar variante
            let modalHTML = `
                <div style="position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:2000;">
                    <div style="background:white; border-radius:20px; padding:1.5rem; max-width:400px; width:90%;">
                        <h3 style="margin-bottom:1rem;">Seleccionar variante: ${producto.nombre}</h3>
            `;
            
            variantes.forEach(v => {
                const colores = v.colores || [];
                const stockTotal = colores.reduce((s,c) => s + (c.stock || 0), 0);
                if (stockTotal > 0) {
                    modalHTML += `
                        <div onclick="agregarAlCarrito(${JSON.stringify(producto).replace(/"/g, '&quot;')}, ${JSON.stringify(v).replace(/"/g, '&quot;')}, ${v.precio_venta})" 
                             style="border:1px solid #eee; border-radius:12px; padding:0.8rem; margin-bottom:0.5rem; cursor:pointer;">
                            <strong>Talla: ${v.talla}</strong><br>
                            Precio: $${(v.precio_venta || 0).toLocaleString()}<br>
                            Stock: ${stockTotal}
                        </div>
                    `;
                }
            });
            
            modalHTML += `
                        <button onclick="this.parentElement.parentElement.remove()" style="margin-top:1rem; width:100%; padding:0.5rem; border:1px solid #ddd; border-radius:40px; background:white;">Cancelar</button>
                    </div>
                </div>
            `;
            
            document.body.insertAdjacentHTML('beforeend', modalHTML);
        }

        function agregarAlCarrito(producto, variante, precio) {
            // Cerrar modal
            const modal = document.querySelector('body > div:last-child');
            if (modal && modal.style.position === 'fixed') modal.remove();
            
            const itemExistente = carrito.find(i => i.id === (variante?.id || producto.id));
            
            if (itemExistente) {
                itemExistente.cantidad++;
            } else {
                carrito.push({
                    id: variante?.id || producto.id,
                    nombre: producto.nombre,
                    talla: variante?.talla || 'Única',
                    precio: precio,
                    cantidad: 1,
                    producto_id: producto.id,
                    variante_id: variante?.id || null
                });
            }
            
            actualizarCarrito();
        }

        function actualizarCarrito() {
            const cantidadTotal = carrito.reduce((sum, i) => sum + i.cantidad, 0);
            carritoCantidad.textContent = cantidadTotal;
            
            if (carrito.length === 0) {
                carritoItems.innerHTML = '<div style="text-align:center; color:#999; padding:2rem;">Carrito vacío</div>';
                finalizarBtn.disabled = true;
                subtotalSpan.textContent = '$0';
                totalSpan.textContent = '$0';
                ivaLinea.style.display = 'none';
                return;
            }
            
            finalizarBtn.disabled = false;
            
            carritoItems.innerHTML = carrito.map((item, idx) => `
                <div class="carrito-item">
                    <div class="item-info">
                        <div class="item-nombre">${item.nombre}</div>
                        <div class="item-detalle">Talla: ${item.talla}</div>
                    </div>
                    <div class="item-cantidad">
                        <button onclick="cambiarCantidad(${idx}, -1)">-</button>
                        <span>${item.cantidad}</span>
                        <button onclick="cambiarCantidad(${idx}, 1)">+</button>
                    </div>
                    <div class="item-precio">$${(item.precio * item.cantidad).toLocaleString()}</div>
                    <button class="item-eliminar" onclick="eliminarDelCarrito(${idx})"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            
            const subtotal = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            
            if (ivaSeleccionado > 0) {
                const base = subtotal / (1 + (ivaSeleccionado / 100));
                const iva = subtotal - base;
                ivaPorcentajeSpan.textContent = ivaSeleccionado;
                ivaValorSpan.textContent = `$${iva.toLocaleString()}`;
                ivaLinea.style.display = 'flex';
                subtotalSpan.textContent = `$${base.toLocaleString()}`;
                totalSpan.textContent = `$${subtotal.toLocaleString()}`;
            } else {
                ivaLinea.style.display = 'none';
                subtotalSpan.textContent = `$${subtotal.toLocaleString()}`;
                totalSpan.textContent = `$${subtotal.toLocaleString()}`;
            }
        }

        function cambiarCantidad(index, delta) {
            const item = carrito[index];
            const nuevaCantidad = item.cantidad + delta;
            if (nuevaCantidad <= 0) {
                eliminarDelCarrito(index);
            } else {
                item.cantidad = nuevaCantidad;
                actualizarCarrito();
            }
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarCarrito();
        }

        function limpiarCarrito() {
            if (carrito.length > 0 && confirm('¿Vaciar carrito?')) {
                carrito = [];
                actualizarCarrito();
            }
        }

        async function finalizarVenta() {
            if (carrito.length === 0) return;
            
            const metodoPago = document.getElementById('metodo-pago').value;
            const subtotal = carrito.reduce((sum, i) => sum + (i.precio * i.cantidad), 0);
            const base = ivaSeleccionado > 0 ? subtotal / (1 + (ivaSeleccionado / 100)) : subtotal;
            const iva = subtotal - base;
            
            if (!confirm(`¿Confirmar venta por $${subtotal.toLocaleString()}?`)) return;
            
            try {
                const token = JSON.parse(localStorage.getItem('admin_token'));
                const userRes = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${token.access_token}` }
                });
                const user = await userRes.json();
                
                const ventaData = {
                    total: subtotal,
                    subtotal: base,
                    iva: iva,
                    iva_porcentaje: ivaSeleccionado,
                    metodo_pago: metodoPago,
                    productos: carrito.map(i => `${i.cantidad}x ${i.nombre} (${i.talla})`).join(', '),
                    vendedor_id: user.id
                };
                
                const ventaRes = await fetch(`${SUPABASE_URL}/rest/v1/ventas`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${token.access_token}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(ventaData)
                });
                
                if (!ventaRes.ok) throw new Error('Error al crear venta');
                
                const venta = await ventaRes.json();
                const ventaId = venta[0]?.id || venta.id;
                
                // Actualizar stock de variantes
                for (const item of carrito) {
                    if (item.variante_id) {
                        const varRes = await fetch(`${SUPABASE_URL}/rest/v1/variantes_producto?id=eq.${item.variante_id}`, {
                            headers: { 'apikey': SUPABASE_KEY }
                        });
                        const variante = await varRes.json();
                        if (variante.length > 0) {
                            const colores = variante[0].colores || [];
                            const nuevoStock = (variante[0].stock_total || 0) - item.cantidad;
                            await fetch(`${SUPABASE_URL}/rest/v1/variantes_producto?id=eq.${item.variante_id}`, {
                                method: 'PATCH',
                                headers: {
                                    'apikey': SUPABASE_KEY,
                                    'Authorization': `Bearer ${token.access_token}`,
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({ stock_total: nuevoStock })
                            });
                        }
                    }
                }
                
                // Mostrar modal
                document.getElementById('factura-total').textContent = `$${subtotal.toLocaleString()}`;
                document.getElementById('factura-iva').textContent = ivaSeleccionado > 0 ? `${ivaSeleccionado}%` : 'Exento';
                document.getElementById('factura-metodo').textContent = metodoPago;
                document.getElementById('modal-factura').classList.add('active');
                
                window.ultimaVenta = {
                    items: [...carrito],
                    total: subtotal,
                    base: base,
                    iva: iva,
                    porcentajeIVA: ivaSeleccionado,
                    metodo: metodoPago,
                    fecha: new Date()
                };
                
                carrito = [];
                actualizarCarrito();
                await cargarProductos();
                
            } catch (error) {
                console.error('Error:', error);
                alert('Error al procesar la venta');
            }
        }

        function imprimirFactura() {
            if (!window.ultimaVenta) return;
            const v = window.ultimaVenta;
            
            const facturaHTML = `
                <html>
                <head><title>Factura Modas La 34</title>
                <style>
                    body { font-family: monospace; max-width: 80mm; margin: 0 auto; padding: 10px; }
                    .header { text-align: center; border-bottom: 1px dashed #000; margin-bottom: 10px; }
                    table { width: 100%; border-collapse: collapse; }
                    th, td { text-align: left; padding: 3px 0; }
                    .total { border-top: 1px dashed #000; margin-top: 10px; padding-top: 10px; }
                    .footer { text-align: center; margin-top: 20px; font-size: 10px; }
                </style>
                </head>
                <body>
                    <div class="header">
                        <h3>🌸 MODAS LA 34</h3>
                        <p>NIT: 123.456.789-0</p>
                        <p>${v.fecha.toLocaleDateString()} ${v.fecha.toLocaleTimeString()}</p>
                    </div>
                    <table>
                        <thead><tr><th>Cant</th><th>Producto</th><th>Precio</th></tr></thead>
                        <tbody>
                            ${v.items.map(i => `<tr><td>${i.cantidad}</td><td>${i.nombre} (${i.talla})</td><td>$${(i.precio * i.cantidad).toLocaleString()}</td></tr>`).join('')}
                        </tbody>
                    </table>
                    <div class="total">
                        <p>Subtotal: $${v.base.toLocaleString()}</p>
                        ${v.porcentajeIVA > 0 ? `<p>IVA ${v.porcentajeIVA}%: $${v.iva.toLocaleString()}</p>` : ''}
                        <p><strong>TOTAL: $${v.total.toLocaleString()}</strong></p>
                        <p>Método: ${v.metodo}</p>
                    </div>
                    <div class="footer">
                        <p>¡Gracias por su compra!</p>
                    </div>
                </body>
                </html>
            `;
            
            const win = window.open('', '_blank');
            win.document.write(facturaHTML);
            win.document.close();
            win.print();
        }

        function nuevaVenta() {
            document.getElementById('modal-factura').classList.remove('active');
            window.ultimaVenta = null;
        }

        // Exponer funciones globales
        window.seleccionarProducto = seleccionarProducto;
        window.agregarAlCarrito = agregarAlCarrito;
        window.cambiarCantidad = cambiarCantidad;
        window.eliminarDelCarrito = eliminarDelCarrito;
        window.limpiarCarrito = limpiarCarrito;
        window.finalizarVenta = finalizarVenta;
        window.imprimirFactura = imprimirFactura;
        window.nuevaVenta = nuevaVenta;
    </script>
</body>
</html>
