<!DOCTYPE html>
<html>
<head>
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <title>Acceso Administrador</title>
    <link rel="stylesheet" href="../css/estilo-comun.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">
    <div class="login-container">
        <h2>👑 Acceso Administrador</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="loginAdmin()">Entrar</button>
        <p><a href="../index.html">← Volver al catálogo</a></p>
    </div>
    
    <script src="../js/supabase-config.js"></script>
    <script>
        async function loginAdmin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
                method: 'POST',
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });
            
            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('admin_token', JSON.stringify(data));
                window.location.href = 'dashboard.html';
            } else {
                alert('Credenciales incorrectas');
            }
        }
    </script>
    <script>
        // Detectar si es móvil y ajustar comportamientos
        function isMobile() {
            return window.innerWidth <= 768;
        }
    
        // Ajustar tablas para scroll horizontal
        function ajustarTablas() {
            if (isMobile()) {
                document.querySelectorAll('.data-table, .puc-section, .movimientos-section').forEach(tabla => {
                    tabla.style.overflowX = 'auto';
                    tabla.style.WebkitOverflowScrolling = 'touch';
                });
            }
        }
    
        // Prevenir zoom en inputs en iOS
        document.querySelectorAll('input, select, textarea').forEach(input => {
            input.addEventListener('touchstart', (e) => {
                e.target.style.fontSize = '16px';
            });
        });
    
        // Ajustar al cargar y al cambiar tamaño
        window.addEventListener('load', ajustarTablas);
        window.addEventListener('resize', ajustarTablas);
    
        // Menú hamburguesa para móvil (opcional)
        function toggleMenu() {
            const nav = document.querySelector('.nav-menu');
            if (isMobile()) {
                if (nav.style.display === 'none' || nav.style.display === '') {
                    nav.style.display = 'grid';
                } else {
                    nav.style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
